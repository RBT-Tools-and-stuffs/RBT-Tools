<style>
/* ============================================================
   RBT TOOLS SETUP — the BCBA/intern side of the table
   Same family as the tablet app; laid out like a planning desk
   ============================================================ */
:root{
  --bg:#F3F1EA;--surface:#FBFAF6;--surface-2:#EEEBE1;--ink:#2B3538;--muted:#75807F;
  --line:#E3DFD3;--primary:#2E8B94;--primary-deep:#1C5A61;--primary-soft:#DEEDEE;
  --amber:#E8935C;--amber-soft:#FBE9DB;--gold:#F2C14E;--gold-soft:#FBF0D7;
  --green:#5FA772;--green-soft:#E2F0E4;--reserve:#D8695B;
  --display:'Fredoka','Nunito',system-ui,sans-serif;
  --body:'Nunito',system-ui,-apple-system,sans-serif;
  --r:18px;--r-lg:24px;--r-pill:999px;
  --shadow:0 1px 2px rgba(43,53,56,.05),0 8px 22px -12px rgba(43,53,56,.16);
  --shadow-lg:0 2px 4px rgba(43,53,56,.07),0 22px 54px -18px rgba(43,53,56,.28);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{font-family:var(--body);background:var(--bg);color:var(--ink);font-size:15px;line-height:1.5}
h1,h2,h3,.disp{font-family:var(--display);font-weight:600;letter-spacing:-.01em;margin:0}
button{font-family:var(--body);cursor:pointer;border:none;background:none;color:inherit;padding:0}
input,textarea,select{font-family:var(--body);color:var(--ink)}
svg.ic{width:1.25em;height:1.25em;fill:none;stroke:currentColor;stroke-width:2.1;stroke-linecap:round;stroke-linejoin:round;display:block}
.hidden{display:none !important}

#app{display:flex;height:100%;overflow:hidden}

/* ---------- sidebar: the caseload ---------- */
#side{width:290px;flex:0 0 auto;background:var(--surface);border-right:1px solid var(--line);
  display:flex;flex-direction:column;min-height:0}
.side-head{padding:22px 20px 14px}
.side-head h1{font-size:23px;color:var(--primary-deep);line-height:1.1}
.side-head p{margin:4px 0 0;font-size:12.5px;font-weight:700;color:var(--muted)}
.side-list{flex:1;overflow:auto;padding:6px 14px 14px;display:flex;flex-direction:column;gap:9px}
.pcard{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:var(--r);
  background:var(--bg);border:1px solid var(--line);text-align:left;transition:transform .12s,box-shadow .15s,border-color .15s}
.pcard:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.pcard.on{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
.pcard .mono{width:46px;height:46px;border-radius:50%;background:var(--primary);color:#fff;
  display:grid;place-items:center;font-family:var(--display);font-weight:600;font-size:17px;flex:0 0 auto}
.pcard.on .mono{background:var(--primary-deep)}
.pcard .pc-t{flex:1;min-width:0}
.pcard .pc-t b{font-size:15.5px}
.pcard .pc-t p{margin:1px 0 0;font-size:11.5px;font-weight:700;color:var(--muted);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.side-foot{padding:14px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:9px}
.side-note{font-size:11px;font-weight:700;color:var(--muted);line-height:1.5;padding:0 4px}

/* ---------- buttons / inputs ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:46px;
  padding:0 20px;border-radius:var(--r-pill);font-weight:800;font-size:14.5px;
  background:var(--surface);color:var(--ink);border:1px solid var(--line);box-shadow:var(--shadow);
  transition:transform .12s,background .15s}
.btn:hover{transform:translateY(-1px)}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.45;pointer-events:none}
.btn-primary{background:var(--primary);color:#fff;border-color:transparent}
.btn-primary:hover{background:var(--primary-deep)}
.btn-ghost{background:transparent;box-shadow:none}
.btn-danger{background:var(--reserve);color:#fff;border-color:transparent}
.btn-lg{min-height:56px;font-size:16.5px;padding:0 28px}
.btn-sm{min-height:38px;font-size:13px;padding:0 14px}
.chip{padding:9px 16px;border-radius:var(--r-pill);background:var(--surface-2);font-weight:800;
  min-height:42px;font-size:13.5px;border:2px solid transparent;display:inline-flex;align-items:center;gap:7px;
  transition:background .15s,transform .1s}
.chip.on{background:var(--primary);color:#fff}
.chip:active{transform:scale(.96)}
.seg{display:inline-flex;background:var(--surface-2);border-radius:var(--r-pill);padding:3px;gap:3px;flex-wrap:wrap}
.seg button{padding:8px 15px;border-radius:var(--r-pill);font-weight:800;color:var(--muted);min-height:38px;font-size:13.5px}
.seg button.on{background:var(--surface);color:var(--primary-deep);box-shadow:var(--shadow)}
.tin{border:2px solid var(--line);border-radius:12px;background:var(--surface);padding:11px 14px;
  font-size:15px;font-weight:700;width:100%}
.tin:focus{outline:none;border-color:var(--primary)}
.tin-s{width:74px;text-align:center}
textarea.tin{resize:vertical;min-height:96px;font-weight:600;line-height:1.55}
.label{font-weight:800;color:var(--muted);font-size:11.5px;text-transform:uppercase;letter-spacing:.05em}
.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.field{display:flex;flex-direction:column;gap:7px}
.icon-btn{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;color:var(--muted);
  background:var(--surface-2);flex:0 0 auto;transition:background .15s,color .15s}
.icon-btn:hover{background:var(--primary-soft);color:var(--primary-deep)}
.icon-btn.danger:hover{background:#f7ddd9;color:var(--reserve)}

/* ---------- main column ---------- */
#main{flex:1;min-width:0;overflow:auto}
.main-inner{max-width:880px;margin:0 auto;padding:26px 26px 90px}
.mtop{display:flex;align-items:center;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.mtop h2{font-size:27px;color:var(--primary-deep);flex:1;min-width:200px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);
  padding:20px 22px;box-shadow:var(--shadow);margin-bottom:16px}
.card > h3{font-size:16px;color:var(--primary-deep);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.card > h3 .tick{width:8px;height:26px;border-radius:99px;background:var(--tool,var(--primary));opacity:.85}
.card .sub{font-size:12.5px;font-weight:700;color:var(--muted);margin:-8px 0 14px;line-height:1.5}
.warn-card{background:var(--amber-soft);border-color:#f0cba8}
.warn-card b{color:#9a5a2f}

/* image slot */
.islot{width:104px;height:104px;border-radius:16px;border:2px dashed var(--line);background:var(--surface-2);
  display:grid;place-items:center;overflow:hidden;position:relative;flex:0 0 auto;color:var(--muted);
  transition:border-color .15s;cursor:pointer}
.islot:hover{border-color:var(--primary)}
.islot.filled{border-style:solid;background:var(--surface)}
.islot img{width:100%;height:100%;object-fit:contain}
.islot .plus{font-size:30px;opacity:.5}
.islot .rm{position:absolute;top:3px;right:3px;width:24px;height:24px;border-radius:50%;
  background:rgba(0,0,0,.55);color:#fff;display:grid;place-items:center;font-size:14px;opacity:0;transition:opacity .15s}
.islot:hover .rm{opacity:1}
.islot.drag{border-color:var(--primary);background:var(--primary-soft)}
.islot.sm{width:76px;height:76px;border-radius:13px}
.islot .lib{position:absolute;left:3px;bottom:3px;width:26px;height:26px;border-radius:8px;
  background:rgba(0,0,0,.55);color:#fff;display:grid;place-items:center;opacity:0;transition:opacity .15s}
.islot:hover .lib{opacity:1}

/* client code chip + pickers */
.codechip{display:inline-flex;align-items:center;gap:12px;padding:9px 24px 9px 14px;border-radius:var(--r-pill);
  color:#fff;font-family:var(--display);font-weight:600;font-size:22px;box-shadow:var(--shadow)}
.codechip .ce{font-size:30px;line-height:1}
.code-pick{display:flex;gap:7px;flex-wrap:wrap}
.code-pick button{width:36px;height:36px;border-radius:50%;border:3px solid transparent;
  display:grid;place-items:center;font-size:20px;background:var(--surface-2);transition:transform .1s}
.code-pick button:hover{transform:scale(1.12)}
.code-pick button.on{border-color:var(--ink)}
.limit-sum{font-size:11.5px;font-weight:800;color:var(--primary-deep);margin-top:5px}

/* built-in picture picker */
.bpick-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;max-height:52vh;overflow:auto}
.bpick-grid button{border:2px solid var(--line);border-radius:14px;overflow:hidden;background:var(--surface);
  padding:0 0 7px;display:flex;flex-direction:column;gap:5px;font-weight:800;font-size:12px;color:var(--muted)}
.bpick-grid img{width:100%;aspect-ratio:1;object-fit:contain;background:var(--surface-2)}
.bpick-grid button:hover{border-color:var(--primary)}

/* step rows (schedule / choice / turns) */
.steprow{display:flex;align-items:center;gap:12px;background:var(--bg);border:1px solid var(--line);
  border-radius:16px;padding:10px 12px;margin-bottom:9px}
.steprow .n{font-family:var(--display);font-weight:600;color:var(--muted);width:26px;text-align:center;flex:0 0 auto}
.steprow .grow{flex:1;min-width:0;display:flex;flex-direction:column;gap:7px}
.steprow .minwrap{display:flex;align-items:center;gap:6px;flex:0 0 auto}
.steprow .minwrap input{width:64px;text-align:center;padding:8px}
.steprow .minwrap .mlab{font-size:11.5px;font-weight:800;color:var(--muted)}
.steprow .ops{display:flex;gap:5px;flex:0 0 auto}

/* tool cards grid for picker */
.toolpick{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px}
.toolpick .chip{justify-content:center;min-height:48px}

/* export rail */
.exportbar{position:sticky;bottom:0;margin:24px -26px -90px;padding:16px 26px calc(16px + env(safe-area-inset-bottom));
  background:color-mix(in srgb,var(--surface) 92%,transparent);backdrop-filter:blur(8px);
  border-top:1px solid var(--line);display:flex;gap:12px;align-items:center;flex-wrap:wrap;z-index:10}
.exportbar .ename{flex:1;min-width:220px;font-size:13px;font-weight:700;color:var(--muted);overflow-wrap:anywhere}
.exportbar .ename b{color:var(--primary-deep)}

/* summary / preview */
.preview-strip{display:flex;gap:8px;overflow-x:auto;padding:4px 2px}
.preview-strip .th{width:64px;height:64px;border-radius:12px;border:2px solid var(--line);overflow:hidden;
  background:var(--surface);flex:0 0 auto;display:grid;place-items:center;font-size:11px;font-weight:800;color:var(--muted);text-align:center}
.preview-strip .th img{width:100%;height:100%;object-fit:contain}
.oklist{display:flex;flex-direction:column;gap:8px}
.okrow{display:flex;gap:10px;align-items:flex-start;font-weight:700;font-size:13.5px}
.okrow .dot{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;flex:0 0 auto;font-size:12px;margin-top:-1px}
.okrow.good .dot{background:var(--green-soft);color:var(--green)}
.okrow.warn .dot{background:var(--amber-soft);color:#9a5a2f}
.okrow p{margin:0;color:var(--muted)}
.okrow.good p b{color:var(--green)}
.okrow.warn p b{color:#9a5a2f}

/* modal */
.scrim{position:fixed;inset:0;background:rgba(20,28,30,.45);backdrop-filter:blur(3px);
  display:flex;align-items:center;justify-content:center;padding:16px;z-index:60}
.modal{background:var(--bg);border-radius:var(--r-lg);width:min(560px,96vw);max-height:92vh;overflow:auto;
  box-shadow:var(--shadow-lg);padding:24px}
.modal h2{font-size:20px;color:var(--primary-deep);margin-bottom:12px}
.flash{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:var(--surface);
  color:var(--ink);padding:11px 22px;border-radius:var(--r-pill);font-weight:800;font-size:14px;
  box-shadow:var(--shadow-lg);z-index:80;max-width:92vw;text-align:center}

.vbadge{display:inline-block;background:var(--primary-soft);color:var(--primary-deep);border-radius:8px;
  padding:2px 8px;font-weight:900;font-size:11px;letter-spacing:.06em;vertical-align:middle}
.ptool-row{display:flex;align-items:center;gap:14px;background:var(--bg);border:1px solid var(--line);
  border-radius:16px;padding:12px 16px;margin-bottom:9px}
.ptool-row .tick2{width:8px;height:34px;border-radius:99px;background:var(--tool,var(--primary));opacity:.85;flex:0 0 auto}
.ptool-row .pt-t{flex:1;min-width:0}
.ptool-row .pt-t b{font-size:15px}
.ptool-row .pt-t p{margin:1px 0 0;font-size:12px;font-weight:700;color:var(--muted)}
.preset-tabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.preset-tabs .chip .px{margin-left:7px;opacity:.5;font-size:16px}
.preset-tabs .chip .px:hover{opacity:1}
.flow-note{background:var(--amber-soft);border:1px solid #f0cba8;border-radius:12px;padding:10px 14px;
  font-size:12.5px;font-weight:700;color:#7a4a20;line-height:1.5;margin-bottom:14px}
.prev-btn{width:34px;height:34px;border-radius:50%;background:var(--primary-soft);color:var(--primary-deep);
  display:inline-grid;place-items:center;flex:0 0 auto}
.prev-btn:hover{background:var(--primary);color:#fff}
.fx-canvas{position:fixed;inset:0;pointer-events:none;z-index:90}
.empty{max-width:560px;margin:60px auto;text-align:center}
.empty h2{font-size:30px;color:var(--primary-deep);margin-bottom:10px}
.empty p{color:var(--muted);font-weight:700;line-height:1.6}
.empty .mono-big{width:88px;height:88px;border-radius:50%;background:var(--primary-soft);color:var(--primary-deep);
  display:grid;place-items:center;margin:0 auto 18px;font-family:var(--display);font-size:34px;font-weight:600}

@media (max-width:840px){
  #app{flex-direction:column}
  #side{width:100%;max-height:44vh;border-right:none;border-bottom:1px solid var(--line)}
  .side-list{flex-direction:row;overflow-x:auto;padding:6px 14px 12px}
  .pcard{min-width:210px}
  .side-foot{flex-direction:row;flex-wrap:wrap;align-items:center}
  .side-note{display:none}
  .main-inner{padding:18px 14px 90px}
  .exportbar{margin:24px -14px -90px;padding:12px 14px calc(12px + env(safe-area-inset-bottom))}
}
</style>
</head>
<body>
<div id="app">
  <aside id="side">
    <div class="side-head">
      <h1>Client Profiles <span class="vbadge">1.02</span></h1>
    </div>
    <div class="side-list" id="plist"></div>
    <div class="side-foot">
      <button class="btn btn-primary" id="newBtn"><svg viewBox="0 0 24 24" class="ic"><path d="M12 5v14M5 12h14"/></svg> New client</button>
      <button class="btn btn-ghost" id="importBtn">Import folder (.zip)</button>
      <button class="btn btn-ghost" id="clinicBtn" title="Every client, one zip — share it on Drive and everyone imports the whole caseload at once">⬆ Export clinic file</button>
      <a class="btn btn-ghost" style="text-decoration:none" href="https://tanner-portal.notion.site/2efc865936c382bea785815773d4e625?pvs=105" target="_blank" rel="noopener">Give feedback</a>
      <button class="btn btn-ghost btn-sm" id="newsBtn">What's new</button>
      <input type="file" id="importInp" accept=".zip,application/zip,application/x-zip-compressed" class="hidden">
      <div class="side-note">Everything you build stays on this computer until you export. Clients are color-animal codes — never names, initials, faces, or any PHI.</div>
    </div>
  </aside>
  <main id="main"><div class="main-inner" id="mainInner"></div></main>
<canvas id="fxCanvas" class="fx-canvas"></canvas>
</div>

<script src="visuals.js"></script>
<script>
'use strict';
/* ============================================================
   RBT TOOLS SETUP · 1.0 — profiles → client folders
   Multiple presets per tool · client.json fidelity · previews
   ============================================================ */
const APP_VERSION = 7; // shown to people as "1.02"
const APP_VERSION_LABEL = '1.02';
const $ = (s, r = document) => r.querySelector(s);
const $$ = (s, r = document) => [...r.querySelectorAll(s)];
const el = (tag, cls, html) => { const n = document.createElement(tag); if (cls) n.className = cls; if (html != null) n.innerHTML = html; return n; };
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const uid = () => 'p' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
function flash(msg) { const f = el('div', 'flash', esc(msg)); document.body.appendChild(f); setTimeout(() => f.remove(), 2200); }
/* storage that never throws — same guard the tablet app carries */
const LS = (() => {
  try { const t = window.localStorage; const k = '__rbts_probe'; t.setItem(k, '1'); t.removeItem(k); return t; }
  catch { const mem = new Map(); return { getItem: k => mem.has(k) ? mem.get(k) : null, setItem: (k, v) => { mem.set(k, String(v)); }, removeItem: k => { mem.delete(k); } }; }
})();

const TOOLS = [
  { key: 'sched', title: 'Schedule', color: '#5FA772' },
  { key: 'timer', title: 'Timer', color: '#E8935C' },
  { key: 'wait', title: 'Wait', color: '#F2C14E' },
  { key: 'token', title: 'Tokens', color: '#F2C14E' },
  { key: 'ft', title: 'First · Then', color: '#2E8B94' },
  { key: 'choice', title: 'Choice', color: '#1C5A61' },
  { key: 'turn', title: 'Turns', color: '#E8935C' },
  { key: 'calm', title: 'Calm', color: '#2E8B94' },
];
const TTITLE = Object.fromEntries(TOOLS.map(t => [t.key, t.title]));
const PRESETABLE = ['sched', 'timer', 'wait', 'token', 'ft', 'choice', 'turn'];

/* ---------- client codes — color + animal, zero PHI ---------- */
const CODE_COLORS = [
  { name: 'Teal',  hex: '#2E8B94' }, { name: 'Coral', hex: '#E8935C' },
  { name: 'Gold',  hex: '#D9A62E' }, { name: 'Green', hex: '#5FA772' },
  { name: 'Blue',  hex: '#4E7DBE' }, { name: 'Plum',  hex: '#8A6FB1' },
  { name: 'Rust',  hex: '#C05B4D' }, { name: 'Pine',  hex: '#1C5A61' },
];
const CODE_ANIMALS = [
  ['Fox','🦊'], ['Owl','🦉'], ['Bear','🐻'], ['Frog','🐸'], ['Duck','🦆'], ['Deer','🦌'],
  ['Otter','🦦'], ['Koala','🐨'], ['Panda','🐼'], ['Bunny','🐰'], ['Turtle','🐢'], ['Whale','🐳'],
  ['Tiger','🐯'], ['Puppy','🐶'], ['Kitten','🐱'], ['Robin','🐦'],
];
function mkCode(ci, ai) {
  const c = CODE_COLORS[ci], a = CODE_ANIMALS[ai];
  return { name: `${c.name} ${a[0]}`, slug: `${c.name}-${a[0]}`.toLowerCase(), color: c.hex, emoji: a[1] };
}
function randomCode(excludeSlug) {
  const used = new Set(Profiles.list.map(p => p.code && p.code.slug).filter(Boolean));
  if (excludeSlug) used.delete(excludeSlug);
  for (let i = 0; i < 300; i++) {
    const code = mkCode(Math.floor(Math.random() * CODE_COLORS.length), Math.floor(Math.random() * CODE_ANIMALS.length));
    if (!used.has(code.slug)) return code;
  }
  return mkCode(0, 0);
}
function codeTaken(slug, selfId) {
  return Profiles.list.some(p => p.id !== selfId && p.code && p.code.slug === slug);
}
function normCode(c) {
  if (!c || !c.slug || !c.name) return null;
  return {
    slug: String(c.slug).toLowerCase().replace(/[^a-z0-9-]/g, '').slice(0, 24),
    name: String(c.name).slice(0, 24),
    color: /^#[0-9a-fA-F]{6}$/.test(c.color || '') ? c.color : '#2E8B94',
    emoji: String(c.emoji || '🙂').slice(0, 8),
  };
}

/* ---------- storage ---------- */
const SDB = {
  db: null,
  open() { return new Promise(res => { try {
    const r = indexedDB.open('rbt-setup', 1);
    r.onupgradeneeded = () => { const d = r.result; if (!d.objectStoreNames.contains('imgs')) d.createObjectStore('imgs', { keyPath: 'id' }); };
    r.onsuccess = () => { SDB.db = r.result; res(); };
    r.onerror = () => res();
  } catch { res(); } }); },
  put(rec) { return new Promise(res => { if (!SDB.db) return res(); const t = SDB.db.transaction('imgs', 'readwrite'); t.objectStore('imgs').put(rec); t.oncomplete = res; t.onerror = res; }); },
  get(id) { return new Promise(res => { if (!SDB.db || !id) return res(null); const t = SDB.db.transaction('imgs', 'readonly'); const q = t.objectStore('imgs').get(id); q.onsuccess = () => res(q.result || null); q.onerror = () => res(null); }); },
  keys() { return new Promise(res => { if (!SDB.db) return res([]); try { const t = SDB.db.transaction('imgs', 'readonly'); const q = t.objectStore('imgs').getAllKeys(); q.onsuccess = () => res(q.result || []); q.onerror = () => res([]); } catch { res([]); } }); },
  del(id) { return new Promise(res => { if (!SDB.db) return res(); try { const t = SDB.db.transaction('imgs', 'readwrite'); t.objectStore('imgs').delete(id); t.oncomplete = res; t.onerror = res; } catch { res(); } }); },
};
/* removed pictures don't haunt the browser: anything no profile references gets swept */
async function gcImages() {
  try {
    const refs = new Set();
    const take = (id) => { if (id && !String(id).startsWith('b:')) refs.add(id); };
    Profiles.list.forEach(p => {
      PRESETABLE.forEach(k => (p.presets[k] || []).forEach(pr => {
        take(pr.img);
        (pr.slots || []).forEach(sl => take(sl.img));
        (pr.options || []).forEach(o => take(o.img));
        (pr.people || []).forEach(pe => take(pe.img));
        (pr.steps || []).forEach(st2 => take(st2.img));
      }));
      (p.gallery || []).forEach(g => take(g.img));
    });
    const keys = await SDB.keys();
    for (const k of keys) if (!refs.has(k)) { await SDB.del(k); const u = urlCache.get(k); if (u) { try { URL.revokeObjectURL(u); } catch {} urlCache.delete(k); } }
  } catch {}
}
const urlCache = new Map();
async function imgURL(id) {
  if (!id) return null;
  if (String(id).startsWith('b:')) {
    const b = (window.BUNDLED_VISUALS || []).find(v => v.id === id.slice(2));
    return b ? b.src : null;
  }
  if (urlCache.has(id)) return urlCache.get(id);
  const rec = await SDB.get(id);
  if (!rec) return null;
  const u = URL.createObjectURL(rec.blob);
  urlCache.set(id, u); return u;
}
function bundledLabel(id) {
  const b = (window.BUNDLED_VISUALS || []).find(v => v.id === String(id).replace(/^b:/, ''));
  return b ? b.label : '';
}
async function storeImage(blob) {
  const id = 'i' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  await SDB.put({ id, blob });
  return id;
}

/* preset factories */
const PF = {
  timer: () => ({ name: '', m: 5, s: 0, moreS: 60, style: 'pie', showNum: true, img: null, imgLabel: '' }),
  wait:  () => ({ name: '', m: 0, s: 30, style: 'pie', showNum: true, img: null, imgLabel: '' }),
  token: () => ({ name: '', count: 5, theme: '⭐', img: null, imgLabel: '' }),
  ft:    () => ({ name: '', useThird: false, slots: [{ img: null, label: '' }, { img: null, label: '' }, { img: null, label: '' }] }),
  choice:() => ({ name: '', options: [{ img: null, label: '' }, { img: null, label: '' }] }),
  turn:  () => ({ name: '', seconds: 30, people: [{ name: '', img: null }, { name: '', img: null }] }),
  sched: () => ({ name: '', mode: 'focus', steps: [] }),
};
const Profiles = {
  list: [], activeId: null,
  load() {
    try { this.list = JSON.parse(LS.getItem('rbts.profiles') || '[]'); } catch { this.list = []; }
    this.list.forEach(p => this.migrate(p));
    this.activeId = LS.getItem('rbts.active') || (this.list[0] && this.list[0].id) || null;
  },
  migrate(p) { // older saves → 1.01: client codes replace initials, fewer knobs
    p.limits = p.limits || {}; p.toolNotes = p.toolNotes || {}; p.visualsOnly = !!p.visualsOnly;
    p.presets = p.presets || { timer: [], wait: [], token: [], ft: [], choice: [], turn: [], sched: [] };
    if (typeof p.updatedBy !== 'string') p.updatedBy = 'BCBA';
    p.tools = (p.tools || []).filter(k => k !== 'note');
    if (!p.code || !p.code.slug) p.code = randomCode(); // initials are gone — a fresh code takes over
    delete p.initials; delete p.noteTags; delete p.session; delete p.role;
  },
  save() { try { LS.setItem('rbts.profiles', JSON.stringify(this.list)); if (this.activeId) LS.setItem('rbts.active', this.activeId); } catch {} },
  active() { return this.list.find(p => p.id === this.activeId) || null; },
  fresh() {
    /* nothing preselected — every prescription is a deliberate choice.
       The code is generated up front: zero PHI from the very first keystroke. */
    return { id: uid(), code: randomCode(), updatedBy: '', note: '',
      tools: [], limits: {}, toolNotes: {}, visualsOnly: false,
      gallery: [], presets: { timer: [], wait: [], token: [], ft: [], choice: [], turn: [], sched: [] }, ts: Date.now() };
  },
};

async function processImage(fileOrBlob) {
  const bmp = await createImageBitmap(fileOrBlob).catch(async () => {
    const img = new Image(); img.src = URL.createObjectURL(fileOrBlob); await img.decode(); return img;
  });
  let w = bmp.width, h = bmp.height;
  let c = document.createElement('canvas'); c.width = w; c.height = h;
  c.getContext('2d').drawImage(bmp, 0, 0);
  const MAX = 900, sc = Math.min(1, MAX / Math.max(w, h));
  if (sc < 1) { const c2 = document.createElement('canvas'); c2.width = Math.round(w * sc); c2.height = Math.round(h * sc);
    c2.getContext('2d').drawImage(c, 0, 0, c2.width, c2.height); c = c2; }
  return await new Promise(res => c.toBlob(res, 'image/jpeg', 0.85));
}
function mkSlot(getId, setId, opts = {}) {
  const s = el('div', 'islot' + (opts.sm ? ' sm' : ''));
  const inp = el('input'); inp.type = 'file'; inp.accept = 'image/*'; inp.className = 'hidden';
  s.appendChild(inp);
  const paint = async () => {
    $$('img,.plus,.rm', s).forEach(n => n.remove());
    const id = getId();
    s.classList.toggle('filled', !!id);
    if (id) {
      const u = await imgURL(id);
      if (u) { const im = el('img'); im.src = u; s.appendChild(im); }
      const rm = el('button', 'rm', '×');
      rm.onclick = (e) => { e.stopPropagation(); setId(null); paint(); markDirty(); };
      s.appendChild(rm);
    } else s.appendChild(el('span', 'plus', '＋'));
  };
  const take = async (file) => {
    if (!file || !file.type.startsWith('image/')) return;
    const blob = await processImage(file);
    const id = await storeImage(blob);
    setId(id, file.name.replace(/\.[^.]+$/, ''));
    paint(); markDirty();
  };
  s.onclick = () => inp.click();
  inp.onchange = () => { take(inp.files[0]); inp.value = ''; };
  s.ondragover = (e) => { e.preventDefault(); s.classList.add('drag'); };
  s.ondragleave = () => s.classList.remove('drag');
  s.ondrop = (e) => { e.preventDefault(); s.classList.remove('drag'); take(e.dataTransfer.files[0]); };
  /* the same starter pictures the tablet app ships with, one click away */
  if (opts.lib !== false && window.BUNDLED_VISUALS && window.BUNDLED_VISUALS.length) {
    const lib = el('button', 'lib');
    lib.innerHTML = '<svg viewBox="0 0 24 24" class="ic" style="width:15px;height:15px"><rect x="4" y="5" width="16" height="14" rx="2.5"/><circle cx="9" cy="10" r="1.7"/><path d="M5 17l4.5-4 3.5 3 3-2.5L19 17"/></svg>';
    lib.title = 'Pick a built-in picture';
    lib.onclick = (e) => { e.stopPropagation(); openBundledPicker((id, label) => { setId('b:' + id, label); paint(); markDirty(); }); };
    s.appendChild(lib);
  }
  paint();
  return s;
}
function openBundledPicker(onPick) {
  const scrim = el('div', 'scrim');
  const modal = el('div', 'modal'); modal.style.width = 'min(680px,96vw)';
  modal.innerHTML = `<h2>Built-in pictures</h2><p style="color:var(--muted);font-weight:700;font-size:12.5px;margin:-6px 0 12px">The same starter set every copy of RBT Tools ships with — nothing gets copied into the folder, so exports stay small.</p>`;
  const search = el('input', 'tin'); search.placeholder = 'Search…'; search.style.marginBottom = '12px';
  const grid = el('div', 'bpick-grid');
  modal.append(search, grid);
  scrim.appendChild(modal);
  scrim.onclick = (e) => { if (e.target === scrim) scrim.remove(); };
  document.body.appendChild(scrim);
  const draw = () => {
    grid.innerHTML = '';
    const q = search.value.trim().toLowerCase();
    (window.BUNDLED_VISUALS || []).filter(v => !q || v.label.toLowerCase().includes(q) || (v.category || '').includes(q)).forEach(v => {
      const b = el('button', '', `<img src="${v.src}" alt=""><span>${esc(v.label)}</span>`);
      b.onclick = () => { scrim.remove(); onPick(v.id, v.label); };
      grid.appendChild(b);
    });
    if (!grid.children.length) grid.appendChild(el('div', 'sub', 'No matches.'));
  };
  search.oninput = draw;
  draw();
  setTimeout(() => search.focus(), 60);
}
let dirtyTimer = 0;
function markDirty() { const p = Profiles.active(); if (!p) return; p.ts = Date.now(); clearTimeout(dirtyTimer); dirtyTimer = setTimeout(() => { Profiles.save(); refreshChecklist(); drawSidebar(); }, 300); }
function cleanName(n) { let s = String(n).replace(/[\s\d._-]+$/, '').replace(/^[\s\d._-]+/, '').trim().slice(0, 24); return s.charAt(0).toUpperCase() + s.slice(1); }

/* ============================================================
   UI
   ============================================================ */
function drawSidebar() {
  const list = $('#plist'); list.innerHTML = '';
  if (!Profiles.list.length) list.appendChild(el('div', 'side-note', 'No clients yet — start one, or import an existing folder to update it.'));
  Profiles.list.slice().sort((a, b) => a.code.name.localeCompare(b.code.name)).forEach(p => {

        o.people.push({ name: pe.name || '', v: pe.img ? await V(pe.img, pe.name, `Turns/${pi + 1} ${safeName(pe.name, 'Player ' + (i + 1))}.jpg`) : null });
      (j.presets.turn ||= []).push(o);
    }
    for (const [pi, pr] of p.presets.sched.entries()) {
      const o = { name: pr.name || undefined, mode: pr.mode, steps: [] };
      for (const [i, st] of pr.steps.entries())
        o.steps.push(await V(st.img, st.label, `Schedule/${pi + 1}-${String(i + 1).padStart(2, '0')} ${safeName(st.label, 'Step ' + (i + 1))}.jpg`));
      (j.presets.sched ||= []).push(o);
    }
    for (const g of p.gallery) {
      if (g.img && String(g.img).startsWith('b:')) { j.gallery.push({ bundled: String(g.img).slice(2), label: g.label || undefined, cat: g.cat }); continue; }
      if (!g.img) continue;
      const sub = { places: 'Places', activities: 'Activities', rewards: 'Rewards' }[g.cat] || 'Activities';
      const rel = await addImg(`Visuals/${sub}/${safeName(g.label, 'Picture')}.jpg`, g.img);
      if (rel) j.gallery.push({ path: rel, label: g.label || undefined, cat: g.cat });
    }
    files.push({ path: base + 'client.json', data: enc.encode(JSON.stringify(j, null, 2)) });
    return j;
  }
}
async function exportProfile(p) {
  const guard = $('.exportbar .btn-primary'); if (guard) guard.disabled = true;
  try {
    const files = [], used = new Set();
    await buildProfileFiles(p, files, used);
    const blob = zipStore(files);
    const a = el('a'); a.href = URL.createObjectURL(blob); a.download = folderName(p) + '.zip'; a.click();
    p.updated = todayStr(); markDirty();
    flash(`Exported ${files.length} file${files.length === 1 ? '' : 's'} — upload the .zip to Google Drive`);
    window.__lastExport = blob;
  } catch (e) {
    flash('Export failed: ' + (e && e.message ? e.message : 'unknown error'));
  } finally { if (guard) guard.disabled = false; }
}
/* the CLINIC FILE: every profile on this computer, one zip.
   Drop it in the shared Drive folder — an RBT imports it once and their whole
   caseload updates; another BCBA imports it and the newer version of each
   client wins. One file, everyone caught up. */
async function exportClinic() {
  const ready = Profiles.list.filter(p => p.code && p.tools.length);
  if (!ready.length) { flash('No clients with prescribed tools to export yet.'); return; }
  const prog = el('div', 'flash', 'Building the clinic file…'); document.body.appendChild(prog);
  try {
    const files = [], used = new Set();
    const manifest = { app: 'rbt-tools', kind: 'clinic', version: APP_VERSION, exported: Date.now(), profiles: [] };
    for (const p of ready) {
      const j = await buildProfileFiles(p, files, used);
      manifest.profiles.push({ slug: p.code.slug, name: p.code.name, ts: j.ts });
    }
    files.push({ path: 'clinic.json', data: new TextEncoder().encode(JSON.stringify(manifest, null, 2)) });
    const blob = zipStore(files);
    const a = el('a'); a.href = URL.createObjectURL(blob); a.download = `Client Profiles — ${todayStr()}.zip`; a.click();
    flash(`Clinic file: ${ready.length} client${ready.length === 1 ? '' : 's'} — share it on Drive`);
    window.__lastClinicExport = blob;
  } catch (e) {
    flash('Clinic export failed: ' + (e && e.message ? e.message : 'unknown error'));
  } finally { prog.remove(); }
}

/* ---------- import: client.json folders from Setup 1.01+ ---------- */
function baseName(p) { return p.split('/').pop(); }
function extOf(p) { const m = p.toLowerCase().match(/\.([a-z0-9]+)$/); return m ? m[1] : ''; }
const IMG_EXT = { png: 1, jpg: 1, jpeg: 1, webp: 1, gif: 1, bmp: 1 };
function stripForLabel(name) {
  let s = name.replace(/\.[^.]+$/, '').replace(/\(\s*\d+\s*m(in)?\s*\)/ig, '').replace(/^[\s\d._-]+/, '').trim().slice(0, 24);
  return s.charAt(0).toUpperCase() + s.slice(1);
}
async function importZip(file) {
  const prog = el('div', 'flash', 'Reading folder…'); document.body.appendChild(prog);
  try {
    const entries = (await unzipAll(await file.arrayBuffer()))
      .map(e => ({ ...e, path: e.path.replace(/\\/g, '/') }))
      .filter(e => !e.path.includes('__MACOSX') && !e.path.split('/').some(s => s.startsWith('.')));
    const confs = entries.filter(e => baseName(e.path).toLowerCase() === 'client.json')
      .sort((a, b) => a.path.split('/').length - b.path.split('/').length);
    if (!confs.length) throw new Error('No client.json in that zip — only folders exported by the Client Profiles app can be opened here.');
    if (confs.length > 1) { await importClinic(confs, entries, prog); return; }
    const { p } = await parseClientFolder(confs[0], entries);
    const ex = Profiles.list.find(x => x.code && x.code.slug === p.code.slug);
    if (ex) { p.id = ex.id; Profiles.list[Profiles.list.indexOf(ex)] = p; }
    else Profiles.list.push(p);
    Profiles.activeId = p.id; Profiles.save(); gcImages();
    prog.remove(); render(); flash(`Imported ${p.code.emoji} ${p.code.name} — ready to edit`);
  } catch (e) {
    prog.remove(); flash('Import failed: ' + (e && e.message ? e.message : 'unreadable file'));
  }
}
/* a clinic file: merge every profile — for each client, the NEWER version wins */
async function importClinic(confs, entries, prog) {
  let updated = 0, kept = 0, failed = 0;
  const names = [];
  for (const conf of confs) {
    try {
      const { p, ts } = await parseClientFolder(conf, entries);
      const ex = Profiles.list.find(x => x.code && x.code.slug === p.code.slug);
      if (ex && (ex.ts || 0) > (ts || 0)) { kept++; continue; } // this computer has newer work — keep it
      p.ts = ts || Date.now();
      if (ex) { p.id = ex.id; Profiles.list[Profiles.list.indexOf(ex)] = p; }
      else Profiles.list.push(p);
      updated++; names.push(`${p.code.emoji} ${p.code.name}`);
    } catch { failed++; }
  }
  Profiles.save(); gcImages();
  prog.remove(); render();
  const m = el('div', 'modal', `<h2>Clinic file merged</h2>
    <div style="font-weight:600;line-height:1.7;color:var(--ink)">
    <p><b>${updated}</b> client${updated === 1 ? '' : 's'} updated${names.length ? ': ' + names.map(esc).join(', ') : ''}.</p>
    ${kept ? `<p><b>${kept}</b> kept as-is — your copy was newer.</p>` : ''}
    ${failed ? `<p style="color:#9a5a2f"><b>${failed}</b> could not be read.</p>` : ''}
    </div>`);
  const scrim = el('div', 'scrim');
  const r = el('div', 'row'); r.style.justifyContent = 'flex-end'; r.style.marginTop = '16px';
  const okB = el('button', 'btn btn-primary', 'Done'); okB.onclick = () => scrim.remove();
  r.appendChild(okB); m.appendChild(r); scrim.appendChild(m);
  scrim.onclick = e => { if (e.target === scrim) scrim.remove(); };
  document.body.appendChild(scrim);
}
async function parseClientFolder(jconf, entries) {
    const base = jconf.path.split('/').slice(0, -1).join('/');
    const under = entries.filter(e => (base ? e.path.startsWith(base + '/') : true))
      .map(e => ({ ...e, rel: base ? e.path.slice(base.length + 1) : e.path }));
    const byRel = new Map(under.map(e => [e.rel.toLowerCase(), e]));
    const toId = async (data, ext) => { const blob = await processImage(new Blob([data], { type: 'image/' + (ext === 'jpg' ? 'jpeg' : ext) })); return await storeImage(blob); };
    const idByPath = async (path) => {
      const e2 = byRel.get(String(path || '').toLowerCase()); if (!e2) return null;
      const ext = extOf(e2.rel); if (!IMG_EXT[ext]) return null;
      return await toId(e2.data, ext);
    };
    const j = JSON.parse(new TextDecoder().decode(jconf.data));
    const code = normCode(j.code);
    if (!code) throw new Error('That folder is from an older Setup (no client code). Rebuild it here and export fresh.');
    if ((j.version || 6) > APP_VERSION) flash('This folder is from a NEWER Setup — imported what was readable.');
    const p = Profiles.fresh();
    p.code = code;
    p.updatedBy = String(j.updatedBy || 'BCBA').slice(0, 24);
    p.note = String(j.note || '').slice(0, 4000);
    const A = { schedule: 'sched', tokens: 'token', turns: 'turn', 'first-then': 'ft' };
    p.tools = (j.tools || []).map(t => A[t] || t).filter(k => TTITLE[k]);
    if (j.limits && typeof j.limits === 'object') { p.limits = {}; Object.entries(j.limits).forEach(([k, L2]) => { const k2 = A[k] || k; if (TTITLE[k2] && L2 && typeof L2 === 'object') p.limits[k2] = { ...(L2.min != null && { min: +L2.min }), ...(L2.max != null && { max: +L2.max }), ...(L2.maxSec != null && { maxSec: +L2.maxSec }) }; }); }
    if (j.toolNotes && typeof j.toolNotes === 'object') { p.toolNotes = {}; Object.entries(j.toolNotes).forEach(([k, t2]) => { const k2 = A[k] || k; if (TTITLE[k2] && t2) p.toolNotes[k2] = String(t2).slice(0, 240); }); }
    p.visualsOnly = !!j.visualsOnly;
    const VV = async (v) => { // json visual → {img,label}
      if (!v) return { img: null, label: '' };
      if (v.bundled) {
        const has = (window.BUNDLED_VISUALS || []).some(b => b.id === v.bundled);
        return { img: has ? 'b:' + v.bundled : null, label: String(v.label || bundledLabel(v.bundled) || '').slice(0, 24) };
      }
      if (v.text) return { img: null, label: String(v.text).slice(0, 24) };
      return { img: await idByPath(v.img), label: String(v.label || stripForLabel(baseName(v.img || ''))).slice(0, 24) };
    };
    const P = j.presets || {};
    for (const pr of (P.timer || [])) { const v = await VV(pr.visual); p.presets.timer.push({ ...PF.timer(), name: pr.name || '', m: pr.m ?? 5, s: pr.s ?? 0, moreS: pr.moreS || 60, style: pr.style || 'pie', showNum: pr.showNum !== false, img: v.img, imgLabel: v.label }); }
    for (const pr of (P.wait || [])) { const v = await VV(pr.reward); p.presets.wait.push({ ...PF.wait(), name: pr.name || '', m: pr.m ?? 0, s: pr.s ?? 30, style: pr.style || 'pie', showNum: pr.showNum !== false, img: v.img, imgLabel: v.label }); }
    for (const pr of (P.token || [])) { const v = await VV(pr.reward); p.presets.token.push({ ...PF.token(), name: pr.name || '', count: pr.count || 5, theme: pr.theme || '⭐', img: v.img, imgLabel: v.label }); }
    for (const pr of (P.ft || [])) { const s0 = await VV(pr.first), s1 = await VV(pr.then), s2 = await VV(pr.third);
      p.presets.ft.push({ name: pr.name || '', useThird: !!pr.useThird, slots: [{ img: s0.img, label: s0.label }, { img: s1.img, label: s1.label }, { img: s2.img, label: s2.label }] }); }
    for (const pr of (P.choice || [])) { const options = []; for (const o of (pr.options || []).slice(0, 16)) { const v = await VV(o); options.push({ img: v.img, label: v.label }); }
      while (options.length < 2) options.push({ img: null, label: '' });
      p.presets.choice.push({ name: pr.name || '', options }); }
    for (const pr of (P.turn || [])) { const people = []; for (const pe of (pr.people || []).slice(0, 16)) { const v = await VV(pe.v); people.push({ name: String(pe.name || '').slice(0, 16), img: v.img }); }
      while (people.length < 2) people.push({ name: '', img: null });
      p.presets.turn.push({ name: pr.name || '', seconds: Math.max(0, +pr.seconds || 0), people }); }
    for (const pr of (P.sched || [])) { const steps = []; for (const s2 of (pr.steps || [])) { const v = await VV(s2); steps.push({ img: v.img, label: v.label }); }
      p.presets.sched.push({ name: pr.name || '', mode: pr.mode === 'list' ? 'list' : 'focus', steps }); }
    for (const g of (j.gallery || [])) {
      if (g.bundled) { const has = (window.BUNDLED_VISUALS || []).some(b => b.id === g.bundled); p.gallery.push({ img: has ? 'b:' + g.bundled : null, label: String(g.label || bundledLabel(g.bundled) || '').slice(0, 24), cat: ['places','activities','rewards'].includes(g.cat) ? g.cat : 'activities' }); continue; }
      p.gallery.push({ img: await idByPath(g.path), label: String(g.label || stripForLabel(baseName(g.path || ''))).slice(0, 24), cat: ['places','activities','rewards'].includes(g.cat) ? g.cat : 'activities' });
    }
    return { p, ts: j.ts || 0 };
}

const CHANGELOG = [
  { v: '1.02', items: [
    'Renamed: this is now the Client Profiles app',
    'Clinic file — export EVERY client as one zip; an RBT imports it once and their whole caseload updates',
    'Importing a clinic file merges: for each client, the newer version wins (great for sharing between BCBAs/interns)',
    'Client Visuals: add a whole folder of pictures in one go',
    'Limits show a live plain-English summary and can never be impossible',
  ] },
  { v: '1.01', items: [
    'Color-animal client codes replaced initials — zero PHI by design',
    'Built-in picture library on every image slot (shares the tablet\'s visuals.js)',
    'Session-settings and quick-tags cards removed',
    'Orphaned pictures cleaned up automatically',
  ] },
];
function openWhatsNew() {
  const scrim = el('div', 'scrim');
  const m = el('div', 'modal', `<h2>What's new</h2>` + CHANGELOG.map(rel =>
    `<div style="margin-bottom:14px"><h2 style="font-size:15px;margin-bottom:6px">Version ${esc(rel.v)}</h2>` +
    rel.items.map(i => `<p style="margin:0 0 4px;font-weight:600;color:var(--ink);line-height:1.55;font-size:13.5px">· ${esc(i)}</p>`).join('') + '</div>').join(''));
  scrim.appendChild(m);
  scrim.onclick = e => { if (e.target === scrim) scrim.remove(); };
  document.body.appendChild(scrim);
}
function confirm2(title, body, onYes) {
  const scrim = el('div', 'scrim');
  const m = el('div', 'modal', `<h2>${esc(title)}</h2><p style="color:var(--muted);font-weight:700">${esc(body)}</p>`);
  const r = el('div', 'row'); r.style.justifyContent = 'flex-end'; r.style.marginTop = '16px';
  const no = el('button', 'btn btn-ghost', 'Cancel'); no.onclick = () => scrim.remove();
  const yes = el('button', 'btn btn-danger', 'Delete'); yes.onclick = () => { scrim.remove(); onYes(); };
  r.append(no, yes); m.appendChild(r); scrim.appendChild(m);
  scrim.onclick = e => { if (e.target === scrim) scrim.remove(); };
  document.body.appendChild(scrim);
}
function newProfile() {
  const p = Profiles.fresh();
  Profiles.list.push(p); Profiles.activeId = p.id; Profiles.save(); render();
  flash(`New client: ${p.code.emoji} ${p.code.name}`);
}
function firstRunAck() {
  try { if (LS.getItem('rbts.ack')) return; } catch {}
  const scrim = el('div', 'scrim');
  const m = el('div', 'modal', `<h2>Before you build</h2>
    <div style="font-weight:600;line-height:1.6;color:var(--ink)">
    <p><b>No PHI, ever.</b> Clients are identified only by their color-animal code — never names, initials, faces, dates of birth, diagnoses or program data, in any field, note, file name or picture. You keep the code↔child mapping in your own records. Treat every export as if it could be read in a waiting room (HIPAA thinking, always).</p>
    <p><b>Your work lives in this browser, on this computer.</b> Opening the app from a different file, browser or machine starts empty. Exported .zip files are the durable copies — keep them on Drive.</p>
    <p><b>Preset with care.</b> Anything you pre-fill is what the RBT starts from every session — defaults they'd have to clear each time break their flow.</p>
    </div>`);
  const r = el('div', 'row'); r.style.justifyContent = 'flex-end'; r.style.marginTop = '16px';
  const ok = el('button', 'btn btn-primary btn-lg', 'I understand');
  ok.onclick = () => { try { LS.setItem('rbts.ack', String(APP_VERSION)); } catch {} scrim.remove(); };
  r.appendChild(ok); m.appendChild(r); scrim.appendChild(m);
  document.body.appendChild(scrim);
}

/* ---------- init ---------- */
(async function init() {
  await SDB.open();
  Profiles.load();
  gcImages();
  $('#newBtn').onclick = newProfile;
  $('#importBtn').onclick = () => $('#importInp').click();
  const cb = $('#clinicBtn'); if (cb) cb.onclick = exportClinic;
  const nb = $('#newsBtn'); if (nb) nb.onclick = openWhatsNew;
  try {
    const seen = LS.getItem('rbts.seenVer');
    if (seen && seen !== APP_VERSION_LABEL) setTimeout(() => flash(`Updated to ${APP_VERSION_LABEL} — tap “What's new” below`), 800);
    LS.setItem('rbts.seenVer', APP_VERSION_LABEL);
  } catch {}
  $('#importInp').onchange = () => { const f = $('#importInp').files[0]; if (f) importZip(f); $('#importInp').value = ''; };
  render();
  firstRunAck();
  window.__setup = { Profiles, exportProfile, exportClinic, importZip, SDB, zipStore, unzipAll, storeImage, processImage, PF, gcImages, randomCode };
})();
