/* ============================================================
   RBT TOOLS — v2
   Design: calm laminated play-materials · one voice, one accent
   Big pie timers · type-first home · chrome out of the way
   ============================================================ */

:root{
  --bg:#F3F1EA;
  --surface:#FBFAF6;
  --surface-2:#EEEBE1;
  --ink:#2B3538;
  --muted:#75807F;
  --line:#E3DFD3;
  --primary:#2E8B94;
  --primary-deep:#1C5A61;
  --primary-soft:#DEEDEE;
  --amber:#E8935C;
  --amber-soft:#FBE9DB;
  --gold:#F2C14E;
  --gold-soft:#FBF0D7;
  --green:#5FA772;
  --green-soft:#E2F0E4;
  --reserve:#D8695B;

  --display:'Fredoka','Nunito',system-ui,sans-serif;
  --body:'Nunito',system-ui,-apple-system,sans-serif;

  --s1:4px;--s2:8px;--s3:12px;--s4:16px;--s5:24px;--s6:32px;--s7:48px;

  --r-card:22px;--r-lg:28px;--r-pill:999px;--r-sm:14px;

  --shadow:0 1px 2px rgba(43,53,56,.05),0 8px 22px -12px rgba(43,53,56,.18);
  --shadow-lg:0 2px 4px rgba(43,53,56,.07),0 22px 54px -18px rgba(43,53,56,.30);
  --ring:0 0 0 4px var(--primary-soft);
  --tap:60px;
}
body.theme-contrast{
  --bg:#0E1416;--surface:#182123;--surface-2:#11191b;--ink:#F4F7F6;--muted:#9FADAE;
  --line:#28363a;--primary:#3FD0DD;--primary-deep:#9FEDF4;--primary-soft:#11333a;
  --amber:#FFB27A;--amber-soft:#3a2416;--gold:#FFD86B;--gold-soft:#3a3010;
  --green:#7FD695;--green-soft:#12301c;
  --shadow:none;--shadow-lg:0 20px 50px -20px #000;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
html,body{height:100%;margin:0}
body{font-family:var(--body);background:var(--bg);color:var(--ink);
  overflow:hidden;overscroll-behavior:none;touch-action:manipulation;
  -webkit-user-select:none;user-select:none}
input,textarea{-webkit-user-select:text;user-select:text}
h1,h2,h3,.disp{font-family:var(--display);font-weight:600;letter-spacing:-.01em;margin:0}
button{font-family:var(--body);cursor:pointer;border:none;background:none;color:inherit;padding:0}
img{-webkit-user-drag:none;user-select:none}
svg.ic{width:1.3em;height:1.3em;fill:none;stroke:currentColor;stroke-width:2.1;
  stroke-linecap:round;stroke-linejoin:round;display:block}
.hidden{display:none !important}

#app{display:flex;flex-direction:column;height:100%;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}

/* ---------------- Top bar: home · tool tabs · run chip · actions ---------------- */
#topbar{display:flex;align-items:center;gap:var(--s2);
  padding:var(--s2) var(--s3);background:var(--surface);
  border-bottom:1px solid var(--line);z-index:20;flex:0 0 auto;min-height:60px;
  white-space:nowrap;overflow:hidden}
.tb-btn{display:inline-flex;flex-direction:column;align-items:center;gap:2px;
  min-width:52px;min-height:52px;justify-content:center;padding:var(--s1) var(--s2);
  border-radius:var(--r-sm);color:var(--muted);font-weight:700;font-size:10.5px;
  flex:0 0 auto;transition:background .15s,color .15s,transform .1s}
.tb-btn .ic{width:22px;height:22px}
.tb-btn:hover{background:var(--surface-2);color:var(--ink)}
.tb-btn:active{transform:scale(.93)}
.tb-btn:focus-visible{outline:none;box-shadow:var(--ring)}
.tb-btn.tb-on{background:var(--primary-soft);color:var(--primary-deep)}
.tb-spacer{flex:1 1 0;min-width:0}
#homeBtn{color:var(--primary-deep)}
/* tight modes set by JS so the bar NEVER clips */
#topbar.tb-c1 .tb-btn span{display:none}
#topbar.tb-c1 .tb-btn{min-width:46px;min-height:46px}
#topbar.tb-c2{gap:4px}

/* recent-tool tabs */
#tabRow{display:inline-flex;gap:5px;flex:0 0 auto;align-items:center}
.tab-t.tab-hide{display:none}
.tab-t{display:inline-flex;align-items:center;gap:7px;padding:10px 15px;border-radius:var(--r-pill);
  font-weight:800;font-size:14.5px;color:var(--muted);background:var(--surface-2);
  border:1px solid transparent;flex:0 0 auto;transition:background .15s,color .15s,transform .1s}
.tab-t:hover{color:var(--ink)}
.tab-t:active{transform:scale(.95)}
.tab-t.on{background:var(--primary);color:#fff}
.tab-t .tdot{width:8px;height:8px;border-radius:50%;background:var(--amber);flex:0 0 auto}
.tab-t.on .tdot{background:#fff}
.tab-t .tdot.live{animation:blink 1.6s ease-in-out infinite}
body.reduce-motion .tab-t .tdot.live{animation:none}
#topbar.tb-c2 .tab-t{padding:9px 10px;font-size:13px}
#topbar.tb-c2 .tb-btn{min-width:42px;min-height:44px}
#topbar.tb-c2 .run-chip{padding:7px 10px}

/* running-timer chip: what's live, from anywhere */
.run-chip{display:inline-flex;align-items:center;gap:8px;margin-left:2px;
  background:var(--primary-soft);color:var(--primary-deep);border-radius:var(--r-pill);
  padding:8px 14px;font-weight:800;font-size:14px;flex:0 0 auto;transition:background .15s,transform .1s}
.run-chip:hover{background:var(--primary);color:#fff}
.run-chip:active{transform:scale(.96)}
.run-chip .dot{width:9px;height:9px;border-radius:50%;background:var(--primary);flex:0 0 auto}
.run-chip.live .dot{animation:blink 1.6s ease-in-out infinite}
.run-chip.over{background:var(--amber-soft);color:#9a5a2f}
.run-chip.over .dot{background:var(--amber);animation:none}
.run-chip .rc-time{font-variant-numeric:tabular-nums;font-family:var(--display);font-weight:600;font-size:15px}
#topbar.tb-c2 .run-chip .rc-label{display:none}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
body.reduce-motion .run-chip.live .dot{animation:none}

/* while any tool is live, the chrome shrinks and the tool gets the room */
body.tool-live #topbar{padding:5px 10px;gap:7px}
body.tool-live #topbar .tb-btn span{display:none}
body.tool-live #topbar .tb-btn{padding:9px}
body.tool-live #homeBtn span{display:none}

/* ---------------- Floating lock (top-left, during tool use) ---------------- */
#floatLock{position:fixed;z-index:46;left:calc(10px + env(safe-area-inset-left));
  top:calc(70px + env(safe-area-inset-top));
  width:56px;height:56px;border-radius:50%;display:grid;place-items:center;
  background:color-mix(in srgb, var(--surface) 82%, transparent);
  border:1px solid var(--line);box-shadow:var(--shadow);color:var(--primary-deep);
  backdrop-filter:blur(4px);transition:transform .12s,background .15s,opacity .2s;opacity:.8}
#floatLock:hover{opacity:1;background:var(--surface)}
#floatLock:active{transform:scale(.9)}
#floatLock .ic{width:24px;height:24px}

/* ---------------- Stage / screens ---------------- */
#stage{flex:1;position:relative;overflow:hidden}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;
  padding:var(--s5);overflow:auto}
@media (max-width:640px){.screen{padding:var(--s4)}}
@keyframes screenIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.screen{animation:screenIn .28s cubic-bezier(.2,.9,.25,1)}
body.reduce-motion .screen{animation:none}

.run-col{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:var(--s4);min-height:0}
.dock{flex:0 0 auto;display:flex;gap:var(--s3);justify-content:center;align-items:center;
  flex-wrap:wrap;padding-top:var(--s4)}

/* ---------------- Home: type-first tiles, no artwork ---------------- */
.home-wrap{flex:1;display:flex;flex-direction:column;min-height:0}
.mode-grid{display:grid;gap:var(--s4);
  grid-template-columns:repeat(auto-fill,minmax(228px,1fr));
  max-width:1020px;margin:auto;width:100%}
.home-scroll{flex:1;overflow:auto;padding:2px;display:flex;flex-direction:column}
.mode-tile{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-card);
  padding:var(--s4) var(--s5);text-align:left;box-shadow:var(--shadow);min-height:96px;
  display:flex;flex-direction:row;align-items:center;gap:var(--s4);position:relative;
  transition:transform .16s,box-shadow .16s,border-color .16s}
.mode-tile:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--primary-soft)}
.mode-tile:active{transform:translateY(0) scale(.99)}
.mode-tile:focus-visible{outline:none;box-shadow:var(--ring),var(--shadow)}
.mode-tile .tick{width:9px;height:46px;border-radius:var(--r-pill);flex:0 0 auto;
  background:var(--tool,var(--primary));opacity:.85}
.mode-tile h3{font-size:26px;line-height:1.1;flex:1;min-width:0;font-weight:500}
@keyframes tileIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.mode-tile{animation:tileIn .4s cubic-bezier(.2,.9,.25,1) backwards}
body.reduce-motion .mode-tile{animation:none}
.tile-live{position:absolute;top:10px;right:12px;display:inline-flex;align-items:center;gap:6px;
  background:var(--primary-soft);color:var(--primary-deep);border-radius:var(--r-pill);
  padding:3px 11px;font-weight:800;font-size:12.5px;font-variant-numeric:tabular-nums}
.tile-live::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--primary)}
.tile-live.paused{background:var(--surface-2);color:var(--muted)}
.tile-live.paused::before{background:var(--muted)}

/* home disclaimer + data note: present, calm, out of the way */
.home-note{flex:0 0 auto;max-width:860px;margin:var(--s4) auto 0;width:100%;
  display:flex;align-items:center;gap:var(--s3);padding:var(--s3) var(--s4);
  background:var(--surface);border:1px solid var(--line);border-radius:var(--r-card)}
.home-note .ic{width:26px;height:26px;color:var(--amber);flex:0 0 auto;stroke-width:1.9}
.home-note .hn-txt{flex:1;min-width:0}
.home-note p{margin:0;font-size:13px;font-weight:700;color:var(--muted);line-height:1.45;white-space:normal}
.home-note p.hn-data{font-size:12px;opacity:.85;margin-top:2px}
.home-note p.hn-data b{color:var(--primary-deep)}
.home-note button{font-weight:800;font-size:13px;color:var(--primary-deep);flex:0 0 auto;
  padding:8px 14px;border-radius:var(--r-pill);background:var(--primary-soft)}
.home-note button:hover{background:var(--primary);color:#fff}

/* active client context: who, when, and the BCBA's note — one quiet strip */
.client-strip{flex:0 0 auto;display:flex;align-items:center;justify-content:center;gap:var(--s3);
  flex-wrap:wrap;padding:0 0 var(--s3);margin-top:calc(-1 * var(--s2))}
.client-strip .cs-txt{font-size:13px;font-weight:700;color:var(--muted)}
.client-strip .cs-txt b{color:var(--primary-deep)}
.cs-note{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:var(--r-pill);
  background:var(--gold-soft);color:#8a6410;font-weight:800;font-size:13px;border:1px solid #ecd9a0;
  transition:transform .12s,background .15s}
.cs-note:hover{background:var(--gold);color:#5c430a}
.cs-note:active{transform:scale(.95)}
.cs-note .ic{width:17px;height:17px}

/* ---------------- Buttons ---------------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:var(--s2);
  min-height:var(--tap);padding:0 var(--s5);border-radius:var(--r-pill);font-weight:800;
  font-size:16px;background:var(--surface);color:var(--ink);border:1px solid var(--line);
  box-shadow:var(--shadow);transition:transform .12s,box-shadow .15s,background .15s}
.btn .ic{width:20px;height:20px}
.btn:hover{transform:translateY(-1px)}
.btn:active{transform:scale(.97)}
.btn:focus-visible{outline:none;box-shadow:var(--ring)}
.btn:disabled{opacity:.4;pointer-events:none}
.btn-primary{background:var(--primary);color:#fff;border-color:transparent}
.btn-primary:hover{background:var(--primary-deep)}
.btn-ghost{background:transparent;box-shadow:none}
.btn-lg{min-height:72px;font-size:21px;padding:0 var(--s7);border-radius:var(--r-pill)}
.btn-block{width:100%}
.btn-sm{min-height:46px;font-size:14px;padding:0 var(--s4)}
.btn-danger{background:var(--reserve);color:#fff;border-color:transparent}
.btn-danger:hover{background:#c05a4d}

/* ---------------- Setup panels ---------------- */
.setup{max-width:820px;margin:0 auto;width:100%;display:flex;flex-direction:column;gap:var(--s4)}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-card);
  padding:var(--s5);box-shadow:var(--shadow)}
.panel h3{font-size:17px;margin-bottom:var(--s4);color:var(--primary-deep)}
.panel .sub{font-size:12.5px;font-weight:700;color:var(--muted);margin:-10px 0 var(--s4)}
.row{display:flex;gap:var(--s3);flex-wrap:wrap;align-items:center}
.row.center-h{justify-content:center}
.label{font-weight:800;color:var(--muted);font-size:12.5px;text-transform:uppercase;letter-spacing:.05em}
.seg{display:inline-flex;background:var(--surface-2);border-radius:var(--r-pill);padding:4px;gap:3px;flex-wrap:wrap}
.seg button{padding:9px 17px;border-radius:var(--r-pill);font-weight:800;color:var(--muted);min-height:46px;font-size:15px}
.seg button.on{background:var(--surface);color:var(--primary-deep);box-shadow:var(--shadow)}
.chip{padding:11px 19px;border-radius:var(--r-pill);background:var(--surface-2);font-weight:800;
  min-height:50px;color:var(--ink);border:2px solid transparent;font-size:15px;
  transition:background .15s,transform .1s;display:inline-flex;align-items:center;gap:6px}
.chip.on{background:var(--primary);color:#fff}
.chip:active{transform:scale(.95)}

/* tool settings live INSIDE setup — compact rows that wrap instead of clipping */
.tool-set{display:flex;gap:var(--s3) var(--s6);flex-wrap:wrap;align-items:flex-start}
.tool-set .ts-item{display:flex;flex-direction:column;align-items:flex-start;gap:7px;min-width:0;max-width:100%}
.tool-set .ts-item > .seg{flex-wrap:wrap;max-width:100%}
.tool-set .label{font-size:11.5px}
.set-hint{color:var(--muted);font-size:13px;font-weight:600;line-height:1.5;margin-top:var(--s3)}

/* preset strip: saved setups load in one tap, right where you set up */
.preset-strip{display:flex;gap:var(--s2);align-items:center;overflow-x:auto;
  padding:4px 2px;scrollbar-width:thin;max-width:820px;margin:0 auto;width:100%;flex:0 0 auto}
.preset-strip .label{flex:0 0 auto;margin-right:4px}
.pchip{display:inline-flex;align-items:center;gap:4px;flex:0 0 auto}
.pchip .px{margin-left:6px;opacity:.45;font-size:19px;line-height:1;padding:2px 4px;border-radius:50%}
.pchip .px:hover{opacity:1;background:rgba(0,0,0,.08)}
.pchip .cb{font-size:11px;font-weight:900;background:var(--gold-soft);color:#8a6410;
  border-radius:6px;padding:2px 6px;letter-spacing:.04em}
.pchip.on{background:var(--primary);color:#fff}
.pchip.on .cb{background:rgba(255,255,255,.25);color:#fff}

/* time input */
.time-input{display:inline-flex;align-items:center;gap:var(--s4);background:var(--surface-2);
  border-radius:var(--r-card);padding:var(--s3) var(--s4)}
.ti-unit{display:flex;flex-direction:column;align-items:center;gap:6px}
.ti-unit .label{font-size:11px}
.ti-btns{display:flex;align-items:center;gap:var(--s3)}
.ti-btns button{width:52px;height:52px;border-radius:50%;background:var(--surface);
  font-size:26px;font-weight:800;box-shadow:var(--shadow);color:var(--primary-deep);
  display:grid;place-items:center;transition:transform .1s}
.ti-btns button:active{transform:scale(.9)}
.ti-val{font-family:var(--display);font-size:34px;font-weight:600;min-width:64px;
  text-align:center;font-variant-numeric:tabular-nums}
.ti-colon{font-family:var(--display);font-size:34px;font-weight:600;color:var(--muted);align-self:flex-end;padding-bottom:10px}
@media (max-width:460px){
  .time-input{gap:var(--s2);padding:var(--s2) var(--s3)}
  .ti-btns{gap:var(--s2)}
  .ti-btns button{width:44px;height:44px;font-size:21px}
  .ti-val{font-size:27px;min-width:46px}
  .ti-colon{font-size:27px;padding-bottom:8px}
}

/* ---------------- Visual slot ---------------- */
.vslot{background:var(--surface-2);border:2px dashed var(--line);border-radius:var(--r-lg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:var(--s2);
  color:var(--muted);font-weight:800;overflow:hidden;position:relative;aspect-ratio:1;width:100%;
  transition:border-color .15s}
.vslot.filled{border-style:solid;border-color:var(--line);background:var(--surface)}
button.vslot:hover,.vslot.tappable:hover{border-color:var(--primary)}
.vslot img{width:100%;height:100%}
.vslot img.fit-contain{object-fit:contain;padding:6%}
.vslot img.fit-cover{object-fit:cover}
.vslot .emoji{font-size:clamp(44px,16vh,140px);line-height:1.15}
.vslot .vtext{font-family:var(--display);font-weight:600;font-size:clamp(22px,5.5vh,58px);
  text-align:center;padding:var(--s4);color:var(--ink);word-break:break-word}
.vslot .plus{font-size:40px;opacity:.45;font-weight:400}
.vlabel{text-align:center;font-family:var(--display);font-weight:600;
  font-size:clamp(19px,3.2vh,36px);margin-top:var(--s2);color:var(--ink)}

/* ---------------- Disks: pie (signature), ring, digits ---------------- */
.disk{position:relative;display:grid;place-items:center;flex:0 0 auto}
.disk > svg{width:100%;height:100%;display:block}
/* ring pieces (rotated so 0 = 12 o'clock) */
.disk .rgrp{transform:rotate(-90deg);transform-origin:150px 150px}
.disk .trk{fill:none;stroke:var(--surface-2);stroke-width:30}
.disk .arc{fill:none;stroke:var(--primary);stroke-width:30;stroke-linecap:round}
.disk .tip{fill:var(--surface);stroke:var(--primary);stroke-width:5}
/* pie pieces: a solid disk of time that melts away — drawn as one thick
   stroked arc so it animates butter-smooth with zero seams or notches */
.disk .pie-plate{fill:var(--surface);stroke:var(--line);stroke-width:2.5}
.disk .pie2{fill:none;stroke:var(--primary);stroke-width:128;transition:stroke .9s linear}
.disk .pie-hub{fill:var(--surface);opacity:.9}
.disk .pie-tick{stroke:var(--line);stroke-width:2.5;stroke-linecap:round}
.disk .pie-tick.major{stroke:var(--muted);stroke-width:3.5}
.disk .pie-tick.on-pie{stroke:rgba(255,255,255,.35)}
.disk-center{position:absolute;text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px}
.disk-time{font-family:var(--display);font-weight:600;color:var(--ink);line-height:1;
  font-variant-numeric:tabular-nums;transition:color .3s}
.disk-caption{font-family:var(--display);font-weight:500;color:var(--muted)}
.disk-check{color:var(--green)}
.disk-check .ic{stroke-width:2.6}
/* time pill under a pie */
.disk-under{font-family:var(--display);font-weight:600;font-variant-numeric:tabular-nums;
  background:var(--surface);border:1px solid var(--line);border-radius:var(--r-pill);
  padding:8px 26px;font-size:clamp(24px,4.5vh,44px);box-shadow:var(--shadow);color:var(--ink);
  transition:color .3s}
.disk-word{font-family:var(--display);font-weight:500;color:var(--muted);
  font-size:clamp(22px,4.5vh,44px);letter-spacing:.01em}
/* sizes — vh caps keep short landscape screens from overflowing */
.disk.d-max{width:max(220px,min(82vmin,calc(100vh - 250px),760px));height:max(220px,min(82vmin,calc(100vh - 250px),760px))}
.disk.d-hero{width:max(190px,min(62vmin,calc(100vh - 460px),540px));height:max(190px,min(62vmin,calc(100vh - 460px),540px))}
.disk.d-hero .disk-time{font-size:clamp(38px,11vmin,92px)}
.disk.d-hero .disk-caption{font-size:clamp(14px,2.6vmin,24px)}
.disk.d-hero .disk-check .ic{width:min(18vmin,120px);height:min(18vmin,120px)}
.disk.d-max .disk-time{font-size:clamp(44px,13vmin,120px)}
.disk.d-max .disk-caption{font-size:clamp(15px,2.8vmin,28px)}
.disk.d-max .disk-check .ic{width:min(22vmin,160px);height:min(22vmin,160px)}
.disk.d-mid{width:min(34vmin,260px);height:min(34vmin,260px)}
.disk.d-mid .disk-time{font-size:clamp(24px,6.5vmin,52px)}
.disk.d-mid .disk-caption{font-size:14px}
.disk.d-mid .disk-check .ic{width:64px;height:64px}
.disk.d-embed{width:clamp(96px,17vh,170px);height:clamp(96px,17vh,170px)}
.disk.d-embed .disk-check .ic{width:44px;height:44px}
/* the last stretch announces itself with color, not motion — calmer to look at */
.disk.urgent .disk-time,.disk-under.urgent{color:#a4592f}
/* ended: expanding rings + screen wash */
@keyframes settleIn{from{transform:scale(.92);opacity:0}to{transform:none;opacity:1}}
.disk.ended > svg{animation:settleIn .5s cubic-bezier(.2,.9,.3,1.2)}
body.reduce-motion .disk.ended > svg{animation:none}
.disk.ended::before,.disk.ended::after{content:"";position:absolute;inset:4%;border-radius:50%;
  border:5px solid var(--green);opacity:0;animation:ringOut 2.2s ease-out infinite;pointer-events:none}
.disk.ended::after{animation-delay:1.1s}
@keyframes ringOut{0%{transform:scale(.86);opacity:.75}100%{transform:scale(1.22);opacity:0}}
body.reduce-motion .disk.ended::before{animation:none;opacity:.5;transform:none}
body.reduce-motion .disk.ended::after{display:none}
.t-salient .disk.ended::before,.t-salient .disk.ended::after{border-color:var(--reserve)}
.t-salient .disk-check{color:var(--reserve)}
.screen{isolation:isolate}
.screen::before{content:"";position:absolute;inset:0;z-index:-1;opacity:0;transition:opacity .9s;pointer-events:none}
.screen.wash-green::before{opacity:1;background:radial-gradient(circle at 50% 42%,var(--green-soft),transparent 72%)}
.screen.wash-gold::before{opacity:1;background:radial-gradient(circle at 50% 38%,var(--gold-soft),transparent 72%)}
.screen.wash-amber::before{opacity:1;background:radial-gradient(circle at 50% 42%,var(--amber-soft),transparent 72%)}
.screen.wash-teal::before{opacity:1;background:radial-gradient(circle at 50% 42%,var(--primary-soft),transparent 72%)}
/* the reward opens with a glow, never a size change — nothing shifts or overlaps */
@keyframes glowPulse{0%,100%{box-shadow:0 0 0 6px var(--gold),0 0 40px 4px rgba(242,193,78,.4)}
  50%{box-shadow:0 0 0 9px var(--gold),0 0 70px 12px rgba(242,193,78,.6)}}
.reward-ready{animation:glowPulse 2.4s ease-in-out infinite;border-color:var(--gold) !important;border-style:solid !important}
body.reduce-motion .reward-ready{animation:none;box-shadow:0 0 0 7px var(--gold),0 0 50px 8px rgba(242,193,78,.5)}

/* the thing a timer is FOR — visual riding above the disk */
.timed-for{display:flex;flex-direction:column;align-items:center;gap:4px;flex:0 0 auto}
.timed-for .vslot{width:min(24vh,210px)}
.timed-for .vlabel{font-size:clamp(17px,2.8vh,30px);margin-top:2px}

.big-digits{font-family:var(--display);font-weight:600;font-size:min(28vh,30vw);
  color:var(--ink);line-height:.95;font-variant-numeric:tabular-nums;transition:color .3s}
.big-digits.urgent{color:#a4592f}

/* inline timer chip */
.tchip{display:inline-flex;align-items:center;gap:10px;background:var(--surface);
  border:1px solid var(--line);border-radius:var(--r-pill);padding:7px 18px 7px 8px;box-shadow:var(--shadow)}
.tchip .disk{width:42px;height:42px}
.tchip .trk,.tchip .arc{stroke-width:56}
.tchip .tip{display:none}
.tchip .t-digits{font-family:var(--display);font-weight:600;font-size:24px;
  font-variant-numeric:tabular-nums;color:var(--ink)}
.tchip.over .t-digits{color:var(--green)}
.tchip .pp{display:none;font-size:17px;color:var(--muted)}
.tchip.paused .pp{display:inline}
.tchip.paused .t-digits{color:var(--muted)}
.tchip.paused .arc{stroke:var(--muted)}
button.tchip{cursor:pointer;transition:transform .1s}
button.tchip:active{transform:scale(.95)}
.tchip.big{padding:10px 24px 10px 12px;border-radius:var(--r-lg)}
.tchip.big .disk{width:64px;height:64px}
.tchip.big .t-digits{font-size:38px}
.tchip.big .pp{font-size:24px}

/* ---------------- First · Then ---------------- */
.ft-banner{flex:0 0 auto;text-align:center;font-family:var(--display);font-weight:600;
  font-size:clamp(24px,4.6vh,48px);padding:8px 34px;border-radius:var(--r-pill);
  background:var(--primary);color:#fff;align-self:center;margin-bottom:var(--s3);
  transition:background .4s,color .4s;max-width:94%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ft-banner.done-state{background:var(--green)}
@keyframes bannerPop{0%{transform:scale(.94)}55%{transform:scale(1.05)}100%{transform:scale(1)}}
.ft-banner.pop{animation:bannerPop .5s cubic-bezier(.2,.9,.3,1.3)}
body.reduce-motion .ft-banner.pop{animation:none}
.ft-wrap{flex:1;display:flex;align-items:stretch;justify-content:center;gap:var(--s4);min-height:0;width:100%}
.ft-col{flex:1;max-width:min(52vh,44vw);display:flex;flex-direction:column;min-height:0;position:relative;
  transition:transform .35s cubic-bezier(.2,.9,.25,1),opacity .35s}
.ft-head{display:flex;align-items:center;gap:9px;align-self:center;margin-bottom:var(--s3);
  font-family:var(--display);font-weight:600;font-size:clamp(20px,3.6vh,38px);
  padding:5px 22px 5px 8px;border-radius:var(--r-pill);
  background:var(--surface-2);color:var(--muted);transition:background .3s,color .3s}
.ft-head .n{width:1.5em;height:1.5em;border-radius:50%;display:grid;place-items:center;
  background:var(--surface);color:var(--muted);font-size:.62em;font-weight:700;transition:inherit}
.ft-col.active .ft-head{background:var(--primary);color:#fff}
.ft-col.active .ft-head .n{background:#fff;color:var(--primary-deep)}
.ft-col.done .ft-head{background:var(--green-soft);color:var(--green)}
.ft-col .vslot{flex:1;aspect-ratio:auto;min-height:100px;transition:box-shadow .35s,opacity .35s}
.ft-col.active{transform:scale(1.03)}
.ft-col.active .vslot{box-shadow:0 0 0 5px var(--primary),var(--shadow-lg)}
.ft-col.pending{opacity:.55;transform:scale(.94)}
.ft-run .ft-col.pending .vslot{filter:saturate(.55)}
.ft-col.done{opacity:.7;transform:scale(.94)}
.ft-col.done .vslot{opacity:.5}
.ft-col.done .vslot::after{content:"";position:absolute;inset:0;background:
  center/34% no-repeat url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%235FA772" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M4 13l5 5L20 7"/></svg>')}
.ft-arrow{align-self:center;color:var(--line);flex:0 0 auto;display:flex;align-items:center;transition:color .3s}
.ft-arrow.lit{color:var(--primary)}
@keyframes arrowNudge{0%,100%{transform:translateX(0)}50%{transform:translateX(9px)}}
.ft-arrow.golive{color:var(--primary);animation:arrowNudge .8s ease-in-out 2}
body.reduce-motion .ft-arrow.golive{animation:none}
.ft-arrow svg{width:min(8vw,64px);height:min(8vw,64px);fill:none;stroke:currentColor;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
@media (max-aspect-ratio:5/6){
  .ft-wrap{gap:var(--s2)}
  .ft-head{font-size:clamp(17px,4.4vw,30px);padding:4px 14px 4px 6px}
  .ft-arrow svg{width:min(6vw,44px);height:min(6vw,44px)}
  .ft-wrap .vlabel{font-size:clamp(15px,3.6vw,26px)}
}

/* ---------------- Tokens ---------------- */
.token-stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:var(--s5);min-height:0}
.token-reward{display:flex;flex-direction:column;align-items:center;gap:var(--s2);min-height:0;flex:0 1 auto}
.token-reward .vslot{width:min(34vh,320px);max-width:70vw}
.token-row{display:flex;gap:min(2.2vw,18px);flex-wrap:wrap;justify-content:center;max-width:94vw}
.token{width:var(--tsz,100px);height:var(--tsz,100px);border-radius:50%;
  background:var(--surface);border:3px dashed var(--line);display:grid;place-items:center;
  font-size:calc(var(--tsz,100px)*.52);line-height:1;
  transition:transform .25s cubic-bezier(.2,.9,.3,1.4),background .25s,border-color .25s;position:relative}
.token .tk{opacity:.16;filter:grayscale(1);transition:opacity .25s,filter .25s}
.token.filled{background:var(--gold-soft);border:3px solid var(--gold)}
.token.filled .tk{opacity:1;filter:none}
@keyframes tokenPop{0%{transform:scale(1)}45%{transform:scale(1.22)}100%{transform:scale(1)}}
.token.pop{animation:tokenPop .4s cubic-bezier(.2,.9,.3,1.4)}
body.reduce-motion .token.pop{animation:none}
.token:active{transform:scale(.93)}
.token-msg{font-family:var(--display);font-weight:600;font-size:clamp(22px,4vh,40px);
  color:var(--muted);text-align:center;transition:color .3s}
.token-msg.won{color:var(--green)}

/* ---------------- Choice ---------------- */
.choice-wrap{flex:1;display:grid;gap:var(--s4);min-height:0;place-items:stretch;align-content:stretch;
  grid-template-columns:repeat(var(--cols,2),minmax(0,1fr));
  grid-auto-rows:minmax(0,1fr);padding:var(--s2)}
.choice-card{background:var(--surface);border:2px solid var(--line);border-radius:var(--r-lg);
  padding:var(--s3);box-shadow:var(--shadow);display:flex;flex-direction:column;
  width:100%;height:100%;max-height:100%;min-height:0;margin:0 auto;
  transition:transform .2s,box-shadow .2s,opacity .3s}
.choice-card .vslot{flex:1;aspect-ratio:auto;min-height:0}
.choice-card .vlabel{font-size:clamp(17px,2.6vh,28px)}
.choice-card:active{transform:scale(.97)}
.choice-card.chosen{box-shadow:0 0 0 5px var(--green),var(--shadow-lg);transform:scale(1.02)}
.choice-card.dim{opacity:.38}
.choice-card.dim:hover{opacity:.6}
/* many choices: cards release their width cap and tighten up */
.choice-wrap.many{gap:var(--s2);align-content:stretch}
.choice-wrap.many .choice-card{max-width:none;padding:var(--s2)}
.choice-wrap.many .choice-card .vlabel{font-size:clamp(12px,1.9vh,19px);margin-top:2px}
.choice-wrap.many .choice-card.chosen{transform:scale(1.01)}


/* ---------------- Turn taking ---------------- */
.turn-wrap{flex:1;display:flex;align-items:center;justify-content:center;gap:var(--s5);min-height:0;flex-wrap:wrap;align-content:center;overflow:auto;padding:12px 22px}
.turn-card{display:flex;flex-direction:column;align-items:center;gap:var(--s3);
  background:var(--surface);border:2px solid var(--line);border-radius:var(--r-lg);
  padding:var(--s5);box-shadow:var(--shadow);width:var(--tcw,min(40vh,320px));max-width:44vw;
  transition:transform .3s,box-shadow .3s,opacity .3s}
/* a crowd of players: tighter cards, smaller names, everyone still visible */
.turn-wrap.crowd{gap:var(--s2)}
.turn-wrap.crowd .turn-card{padding:var(--s2);gap:var(--s1);border-radius:var(--r-card);max-width:24vw}
.turn-wrap.crowd .turn-card .t-name{font-size:clamp(13px,2.2vh,20px)}
.turn-wrap.crowd .turn-card .t-fillname{font-size:clamp(14px,2.6vh,26px);border-radius:var(--r-sm)}
.turn-wrap.crowd .turn-card.active{transform:scale(1.05)}
.turn-card .vslot{width:100%}
.turn-card .t-fillname{width:100%;aspect-ratio:1;display:grid;place-items:center;
  background:var(--surface-2);border-radius:var(--r-lg);font-family:var(--display);font-weight:600;
  font-size:clamp(30px,7vh,72px);color:var(--ink);text-align:center;padding:var(--s3);
  word-break:break-word;line-height:1.05}
.turn-card .t-fillname.t-face{font-size:clamp(56px,16vh,140px);padding:0}
.turn-card.active .t-fillname{background:var(--surface)}
.turn-card .t-name{font-family:var(--display);font-weight:600;font-size:clamp(22px,4.5vh,44px)}
.turn-card.active{box-shadow:0 0 0 4px var(--primary),var(--shadow-lg);transform:scale(1.03);
  background:var(--primary-soft)}
.turn-card.active .vslot{background:var(--surface)}
.turn-card.idle{opacity:.45}
.turn-card.idle:hover{opacity:.65}
.turn-person{display:flex;flex-direction:column;gap:10px;width:150px;flex:0 0 auto}
.turn-person .vslot{width:100%}
.person-name{font-size:20px;padding:9px;width:100%}
@keyframes turnFlash{0%,100%{box-shadow:0 0 0 4px var(--amber),var(--shadow-lg)}
  50%{box-shadow:0 0 0 16px rgba(232,147,92,.32),var(--shadow-lg)}}
.turn-card.time-up{animation:turnFlash .55s ease-in-out 2;box-shadow:0 0 0 4px var(--amber),var(--shadow-lg)}
body.reduce-motion .turn-card.time-up{animation:none;box-shadow:0 0 0 6px var(--amber),var(--shadow-lg)}
.turn-banner{width:100%;max-width:560px;text-align:center;font-family:var(--display);font-weight:600;
  font-size:clamp(24px,5vh,52px);color:var(--ink);border-radius:var(--r-pill);padding:6px 30px;
  transition:background .3s}

/* ---------------- Schedule ---------------- */
.sched-list{display:flex;flex-direction:column;gap:var(--s3);max-width:720px;margin:0 auto;width:100%}
.sched-item{display:flex;align-items:center;gap:var(--s4);background:var(--surface);
  border:1px solid var(--line);border-radius:var(--r-card);padding:var(--s3);box-shadow:var(--shadow)}
.sched-item .thumb{width:66px;height:66px;border-radius:14px;overflow:hidden;flex:0 0 auto;
  background:var(--surface-2);display:grid;place-items:center;font-size:34px}
.sched-item .thumb img{width:100%;height:100%;object-fit:contain}
.sched-item .grow{flex:1;font-family:var(--display);font-weight:600;font-size:20px;min-width:0;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.icon-btn{width:46px;height:46px;border-radius:50%;display:grid;place-items:center;color:var(--muted);
  background:var(--surface-2);transition:background .15s,color .15s,transform .1s;flex:0 0 auto}
.icon-btn:hover{background:var(--primary-soft);color:var(--primary-deep)}
.icon-btn:active{transform:scale(.9)}

/* focus mode: NOW is obvious without shouting, and NEXT is right there beside it */
.sf-wrap{flex:1;display:flex;flex-direction:column;min-height:0;gap:var(--s4);align-items:center}
.sf-hero{flex:1;min-height:0;width:100%;max-width:980px;display:flex;align-items:stretch;
  justify-content:center;gap:var(--s4)}
.sf-card{flex:1 1 46%;max-width:480px;background:var(--surface);border:2px solid var(--primary);
  border-radius:var(--r-lg);box-shadow:0 0 0 3px var(--primary-soft),var(--shadow-lg);
  display:flex;flex-direction:column;padding:var(--s4);min-height:0;position:relative}
.sf-card .vslot{flex:1;aspect-ratio:auto;min-height:0;border:none;background:var(--surface)}
.sf-name{text-align:center;font-family:var(--display);font-weight:600;
  font-size:clamp(24px,4.6vh,46px);padding:4px 0 2px}
.sf-next{flex:0 1 30%;max-width:300px;min-width:0;background:var(--surface);border:2px dashed var(--line);
  border-radius:var(--r-lg);display:flex;flex-direction:column;padding:var(--s3);opacity:.92;
  align-self:center;max-height:76%}
.sf-next .vslot{flex:1;aspect-ratio:auto;min-height:70px;border:none;background:var(--surface)}
.sf-next .sf-name{font-size:clamp(17px,2.8vh,28px);color:var(--muted)}
.sf-next-tag{align-self:center;font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
  background:var(--amber-soft);color:#9a5a2f;border-radius:var(--r-pill);padding:4px 14px;margin-bottom:6px}
@media (max-aspect-ratio:4/5){
  .sf-next{display:none} /* portrait: the amber "next" thumbnail in the strip carries it */
  .sf-card{max-width:min(440px,88vw)}
}
.sf-side{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:var(--s4);flex:0 0 auto}
.sf-tag{font-size:13px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
  background:var(--primary);color:#fff;border-radius:var(--r-pill);padding:6px 16px}
.sf-check{width:clamp(76px,12vh,120px);height:clamp(76px,12vh,120px);border-radius:50%;
  background:var(--primary);color:#fff;display:grid;place-items:center;box-shadow:var(--shadow-lg);
  transition:transform .12s,background .15s}
.sf-check:hover{background:var(--primary-deep)}
.sf-check:active{transform:scale(.9)}
.sf-check .ic{width:52%;height:52%;stroke-width:2.8}
.sf-strip{flex:0 0 auto;display:flex;gap:var(--s2);align-items:flex-start;overflow-x:auto;
  max-width:100%;padding:6px 4px 10px}
.sf-step{display:flex;flex-direction:column;align-items:center;gap:5px;flex:0 0 auto;width:clamp(66px,9.5vh,96px)}
.sf-step .th{width:100%;aspect-ratio:1;border-radius:16px;overflow:hidden;background:var(--surface);
  border:2px solid var(--line);display:grid;place-items:center;font-size:clamp(26px,4.5vh,40px);position:relative;
  transition:border-color .3s,opacity .3s}
.sf-step .th img{width:100%;height:100%;object-fit:contain}
.sf-step .cap{font-size:11.5px;font-weight:800;color:var(--muted);max-width:100%;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap}
.sf-step.done .th{opacity:.55}
.sf-step.done .th::after{content:"";position:absolute;inset:0;background:rgba(95,167,114,.22)}
.sf-step.done .th::before{content:"✓";position:absolute;z-index:1;color:#fff;font-weight:900;
  font-size:1.4em;text-shadow:0 1px 3px rgba(0,0,0,.3)}
.sf-step.now .th{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
.sf-step.next .th{border-color:var(--amber);box-shadow:0 0 0 3px var(--amber-soft)}
.sf-step.next .cap{color:#9a5a2f}
.sf-step.later .th{opacity:.7}

/* list mode */
.sp-list{flex:1;display:flex;flex-direction:column;gap:var(--s3);max-width:760px;margin:0 auto;
  width:100%;overflow:auto;min-height:0;padding:var(--s2);padding-bottom:74px}
.sp-item{display:flex;align-items:center;gap:var(--s4);background:var(--surface);
  border:2px solid var(--line);border-radius:var(--r-card);padding:var(--s3) var(--s4);
  box-shadow:var(--shadow);transition:opacity .3s,box-shadow .3s,transform .3s;flex:0 0 auto}
.sp-item .thumb{width:clamp(64px,10.5vh,112px);height:clamp(64px,10.5vh,112px);border-radius:18px;overflow:hidden;flex:0 0 auto;
  background:var(--surface-2);display:grid;place-items:center;font-size:clamp(34px,6vh,58px)}
.sp-item .thumb img{width:100%;height:100%;object-fit:contain}
.sp-item .grow{flex:1;font-family:var(--display);font-weight:600;font-size:clamp(22px,3.8vh,36px);min-width:0}
.sp-item.done{opacity:.55;border-color:transparent;background:var(--green-soft)}
.sp-item.done .thumb{filter:grayscale(.6)}
.sp-item.done .grow{color:var(--muted)}
.sp-item.now{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft),var(--shadow-lg);
  transform:scale(1.015);background:linear-gradient(90deg,var(--primary-soft),var(--surface) 45%)}
.sp-item.now .thumb{width:clamp(80px,13vh,132px);height:clamp(80px,13vh,132px)}
.sp-item.now .grow{font-size:clamp(26px,4.6vh,44px)}
.sp-item.next{opacity:.85;border-style:dashed}
.sp-tag{font-size:12px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;
  padding:5px 13px;border-radius:var(--r-pill);flex:0 0 auto;background:var(--surface-2);color:var(--muted)}
.sp-item.done .sp-tag{background:transparent;color:var(--green)}
.sp-item.now .sp-tag{background:var(--primary);color:#fff}
.sp-item.next .sp-tag{background:var(--amber-soft);color:#9a5a2f}
.sp-check{width:clamp(56px,9vh,86px);height:clamp(56px,9vh,86px);border-radius:50%;flex:0 0 auto;
  display:grid;place-items:center;transition:background .2s,color .2s,transform .1s}
.sp-check.todo{background:var(--primary);color:#fff}
.sp-check.todo:hover{background:var(--primary-deep)}
.sp-check.todo:active{transform:scale(.9)}
.sp-check.done-mark{background:var(--green-soft);color:var(--green)}
.sp-check .ic{width:55%;height:55%;stroke-width:2.8}
.sp-check.done-mark .ic path{stroke-dasharray:26;stroke-dashoffset:26;animation:draw .45s .05s ease forwards}
@keyframes draw{to{stroke-dashoffset:0}}
body.reduce-motion .sp-check.done-mark .ic path{animation:none;stroke-dashoffset:0}

/* ---------------- Calm ---------------- */
.calm-screen{position:absolute;inset:0;background:linear-gradient(165deg,#16444a,#1C5A61 45%,#26707a);
  display:flex;flex-direction:column;align-items:center;color:#fff}
.calm-body{flex:1;width:100%;display:grid;place-items:center;min-height:0;position:relative}
.calm-canvas{position:absolute;inset:0;width:100%;height:100%}
.breath2{position:relative;display:grid;place-items:center;
  width:min(46vmin,400px);height:min(46vmin,400px)}
.breath-ball{position:absolute;inset:0;border-radius:50%;will-change:transform;
  background:radial-gradient(circle at 40% 35%,rgba(255,255,255,.5),rgba(255,255,255,.09))}
.breath-word{position:relative;z-index:1;font-family:var(--display);font-weight:500;
  font-size:clamp(22px,3.6vmin,40px);opacity:.95;color:#fff;text-align:center}
.calm-tabs{display:flex;gap:var(--s2);padding:var(--s4) 0 var(--s5);position:relative;z-index:2;flex-wrap:wrap;justify-content:center}
.calm-tab{padding:11px 22px;border-radius:var(--r-pill);font-weight:800;font-size:15px;
  color:rgba(255,255,255,.65);background:rgba(255,255,255,.1);transition:background .2s,color .2s}
.calm-tab.on{background:rgba(255,255,255,.92);color:var(--primary-deep)}
.calm-sub{display:flex;gap:6px;position:relative;z-index:2;padding-bottom:var(--s2);flex-wrap:wrap;justify-content:center}
.calm-sub button{padding:8px 16px;border-radius:var(--r-pill);font-weight:800;font-size:13px;
  color:rgba(255,255,255,.6);background:rgba(255,255,255,.08)}
.calm-sub button.on{background:rgba(255,255,255,.25);color:#fff}
.calm-exit{position:absolute;top:var(--s4);right:var(--s4);z-index:2;opacity:.55;color:#fff;
  background:rgba(255,255,255,.12);border-radius:var(--r-pill);padding:10px 20px;font-weight:800}
.calm-exit:hover{opacity:1}

/* ---------------- Modals ---------------- */
.modal-scrim{position:fixed;inset:0;background:rgba(20,28,30,.45);backdrop-filter:blur(3px);
  display:flex;align-items:center;justify-content:center;padding:var(--s4);z-index:60;animation:fadeIn .18s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg);border-radius:var(--r-lg);width:min(920px,96vw);max-height:92vh;
  display:flex;flex-direction:column;box-shadow:var(--shadow-lg);overflow:hidden;
  animation:popIn .24s cubic-bezier(.2,.9,.25,1)}
@keyframes popIn{from{transform:scale(.97) translateY(6px);opacity:0}to{transform:none;opacity:1}}
body.reduce-motion .modal,body.reduce-motion .modal-scrim{animation:none}
.modal-head{display:flex;align-items:center;gap:var(--s3);padding:var(--s4) var(--s5);
  border-bottom:1px solid var(--line);background:var(--surface)}
.modal-head h2{font-size:22px;color:var(--primary-deep);flex:1}
.modal-body{padding:var(--s5);overflow:auto}
.modal-foot{padding:var(--s4) var(--s5);border-top:1px solid var(--line);display:flex;gap:var(--s3);
  justify-content:flex-end;background:var(--surface);flex-wrap:wrap}
.x-btn{width:46px;height:46px;border-radius:50%;display:grid;place-items:center;color:var(--muted)}
.x-btn:hover{background:var(--surface-2);color:var(--ink)}

/* picker */
.tabs{display:flex;gap:var(--s2);margin-bottom:var(--s4);flex-wrap:wrap}
.tab{padding:11px 21px;border-radius:var(--r-pill);font-weight:800;color:var(--muted);background:var(--surface-2);min-height:50px;font-size:15px}
.tab.on{background:var(--primary);color:#fff}
.pick-clear{display:flex;justify-content:center;margin-bottom:var(--s4)}
.pick-cats{display:flex;gap:var(--s2);margin-bottom:var(--s4);flex-wrap:wrap}
.pick-cat{padding:8px 15px;border-radius:var(--r-pill);font-weight:700;font-size:13.5px;
  background:var(--surface-2);color:var(--muted)}
.pick-cat.on{background:var(--primary-soft);color:var(--primary-deep)}
.pick-grid{display:grid;gap:var(--s3);grid-template-columns:repeat(auto-fill,minmax(116px,1fr))}
.pick-item{background:var(--surface);border:2px solid var(--line);border-radius:var(--r-sm);
  aspect-ratio:1;overflow:hidden;display:flex;flex-direction:column;position:relative;transition:transform .12s,box-shadow .15s,border-color .15s}
.pick-item:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--primary-soft)}
.pick-item:active{transform:scale(.96)}
.pick-item .pv{flex:1;display:grid;place-items:center;overflow:hidden}
.pick-item .pv img{width:100%;height:100%;object-fit:contain;padding:6%}
.pick-item .cap{font-size:11.5px;font-weight:700;text-align:center;padding:5px;color:var(--muted);
  background:var(--surface);border-top:1px solid var(--line);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pick-item .del{position:absolute;top:4px;right:4px;width:27px;height:27px;border-radius:50%;
  background:rgba(0,0,0,.5);color:#fff;display:grid;place-items:center;font-size:15px;opacity:0;transition:opacity .15s}
.pick-item:hover .del{opacity:1}
.pick-item .edit{position:absolute;top:4px;left:4px;width:27px;height:27px;border-radius:50%;
  background:rgba(0,0,0,.5);color:#fff;display:grid;place-items:center;font-size:14px;opacity:0;transition:opacity .15s}
.pick-item:hover .edit{opacity:1}
@media (hover:none){.pick-item .del,.pick-item .edit{opacity:1}}
.emoji-grid{display:grid;gap:var(--s2);grid-template-columns:repeat(auto-fill,minmax(66px,1fr));margin:var(--s3) 0 var(--s4)}
.emoji-cell{aspect-ratio:1;display:grid;place-items:center;font-size:36px;border-radius:14px;
  background:var(--surface);position:relative;transition:background .12s,transform .1s}
.emoji-cell:hover{background:var(--surface-2)}
.emoji-cell:active{transform:scale(.88)}
.emoji-cell .del{position:absolute;top:1px;right:1px;width:22px;height:22px;border-radius:50%;
  background:rgba(0,0,0,.45);color:#fff;display:grid;place-items:center;font-size:13px;opacity:0}
.emoji-cell:hover .del{opacity:1}
@media (hover:none){.emoji-cell .del{opacity:.7}}
.emoji-add{display:flex;gap:var(--s3);align-items:center;margin-bottom:var(--s2)}
.emoji-add input{width:110px;font-size:34px;text-align:center;padding:8px;border-radius:var(--r-sm);
  border:2px solid var(--line);background:var(--surface);color:var(--ink);font-family:var(--body)}
.emoji-add input:focus{outline:none;border-color:var(--primary)}
.text-entry{width:100%;font-family:var(--display);font-size:34px;font-weight:600;text-align:center;
  padding:var(--s4);border-radius:var(--r-card);border:2px solid var(--line);background:var(--surface);color:var(--ink)}
.text-entry:focus{outline:none;border-color:var(--primary);box-shadow:var(--ring)}

/* settings */
.set-group{margin-bottom:var(--s5)}
.set-group h3{font-size:13.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:var(--s3)}
.set-row{display:flex;align-items:center;gap:var(--s4);padding:var(--s4);background:var(--surface);
  border:1px solid var(--line);border-radius:var(--r-card);margin-bottom:var(--s3);flex-wrap:wrap}
.set-row .txt{flex:1;min-width:150px}
.set-row .txt b{font-weight:800;font-size:16px}
.set-row .txt p{margin:2px 0 0;color:var(--muted);font-size:13.5px;font-weight:600}
.switch{width:60px;height:36px;border-radius:var(--r-pill);background:var(--surface-2);position:relative;
  transition:background .2s;flex:0 0 auto;border:1px solid var(--line);cursor:pointer}
.switch.on{background:var(--green);border-color:var(--green)}
.switch::after{content:"";position:absolute;top:3px;left:3px;width:28px;height:28px;border-radius:50%;
  background:#fff;box-shadow:var(--shadow);transition:transform .2s}
.switch.on::after{transform:translateX(24px)}
.slider{width:170px;accent-color:var(--primary);height:8px}

.hint{color:var(--muted);font-weight:600;text-align:center;padding:var(--s5);line-height:1.5}
.about-text{color:var(--ink);font-weight:600;line-height:1.6;font-size:15px}
.about-text p{margin:0 0 12px}
.about-text b{color:var(--primary-deep)}

/* ---------------- Holds: claimed touches, visible progress ---------------- */
#floatReset,#floatLock,.pane-reset,#unlockZone,.sf-check,.sp-check{touch-action:none}
.hold-ring{position:absolute;right:7px;bottom:7px;width:30px;height:30px;pointer-events:none;
  opacity:0;animation:holdRingIn var(--hms,650ms) linear forwards;z-index:3}
.hold-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.hold-ring circle{fill:none;stroke:var(--primary);stroke-width:5;stroke-linecap:round;
  stroke-dasharray:100;stroke-dashoffset:100;animation:holdRingFill var(--hms,650ms) linear forwards}
@keyframes holdRingIn{0%,22%{opacity:0}34%,100%{opacity:.95}}
@keyframes holdRingFill{to{stroke-dashoffset:0}}
body.reduce-motion .hold-ring{animation-duration:1ms}

/* ---------------- Child lock ---------------- */
body.locked .adult-only{display:none !important}
body.locked :is(button,.vslot,input,.switch):not(.kid-safe){pointer-events:none}
body.locked .kid-safe{pointer-events:auto}
#lockLayer{position:fixed;inset:0;z-index:50;pointer-events:none}
.unlock-zone{position:absolute;left:calc(10px + env(safe-area-inset-left));
  top:calc(10px + env(safe-area-inset-top));width:110px;height:110px;
  display:grid;place-items:center;opacity:.14;pointer-events:auto}
.unlock-zone.holding{opacity:.9}
.unlock-ring{width:70px;height:70px;position:absolute}
.unlock-ring circle{fill:none;stroke:var(--primary);stroke-width:4;
  stroke-dasharray:107;stroke-dashoffset:107;transform-origin:center}
.unlock-zone.holding .unlock-ring circle{transition:stroke-dashoffset var(--hold,1.6s) linear;stroke-dashoffset:0}
.unlock-hint{color:var(--primary-deep)}
.unlock-hint .ic{width:30px;height:30px}
.lock-flash{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:var(--surface);
  color:var(--muted);padding:10px 20px;border-radius:var(--r-pill);font-weight:700;font-size:14px;
  box-shadow:var(--shadow-lg);z-index:52;animation:fadeIn .2s;max-width:92vw;text-align:center}

.fx-canvas{position:fixed;inset:0;pointer-events:none;z-index:70}

/* ---------------- Duo (split) mode ---------------- */
.split{position:absolute;inset:0;display:flex;flex-direction:column}
.pane{flex:1 1 50%;min-height:0;position:relative;overflow:hidden}
.pane .screen{padding:var(--s3)}
.split-div{flex:0 0 16px;background:var(--surface);border-top:1px solid var(--line);
  border-bottom:1px solid var(--line);display:grid;place-items:center;touch-action:none;
  cursor:row-resize;position:relative;z-index:5}
.split-div::after{content:"";width:52px;height:6px;border-radius:var(--r-pill);background:var(--line)}
.split-div:hover::after,.split-div.dragging::after{background:var(--primary)}
.pane-reset{position:absolute;top:8px;right:8px;z-index:6;width:42px;height:42px;border-radius:50%;
  display:grid;place-items:center;color:var(--muted);background:color-mix(in srgb,var(--surface) 80%,transparent);
  border:1px solid var(--line);opacity:.6}
.pane-reset:hover{opacity:1;color:var(--ink)}
.pane .setup{gap:var(--s3)}
.pane .panel{padding:var(--s4)}
.pane .panel h3{margin-bottom:var(--s3)}
.pane .dock{padding-top:var(--s2);gap:var(--s2)}
.pane .btn-lg{min-height:52px;font-size:16px;padding:0 var(--s5)}
.pane .btn{min-height:48px;font-size:14.5px}
.pane .big-digits{font-size:min(17vh,22vw)}
.pane .ft-banner{font-size:clamp(15px,3vh,24px);padding:4px 20px;margin-bottom:var(--s2)}
.pane .ft-wrap{flex-direction:row;gap:var(--s2)}
.pane .ft-head{font-size:clamp(14px,3vh,20px);padding:3px 12px 3px 5px;margin-bottom:6px}
.pane .ft-arrow svg{transform:none;width:30px;height:30px}
.pane .ft-col .vslot{min-height:70px}
.pane .vlabel{font-size:clamp(12px,2.4vh,18px);margin-top:4px}
.pane .vslot .emoji{font-size:clamp(28px,10vh,84px)}
.pane .vslot .vtext{font-size:clamp(15px,4vh,34px)}
.pane .choice-wrap{grid-template-columns:repeat(var(--cols,2),minmax(0,1fr)) !important;gap:var(--s3)}
.pane .choice-card{padding:var(--s2)}
.pane .turn-card{width:min(24vh,200px);padding:var(--s3);gap:var(--s2)}
.pane .turn-card .t-name{font-size:clamp(16px,3.2vh,26px)}
.pane .turn-card .t-fillname{font-size:clamp(18px,4vh,34px)}
.pane .turn-banner{font-size:clamp(16px,3.4vh,26px);padding:3px 18px}
.pane .turn-wrap{gap:var(--s3)}
.pane .sp-item{padding:var(--s2) var(--s3)}
.pane .sp-item .thumb{width:clamp(44px,7vh,64px);height:clamp(44px,7vh,64px);font-size:clamp(24px,4vh,36px)}
.pane .sp-item.now .thumb{width:clamp(52px,8.5vh,76px);height:clamp(52px,8.5vh,76px)}
.pane .sp-item .grow{font-size:clamp(16px,2.8vh,24px)}
.pane .sp-item.now .grow{font-size:clamp(18px,3.2vh,28px)}
.pane .sp-check{width:clamp(44px,6.5vh,60px);height:clamp(44px,6.5vh,60px)}
.pane .tchip.big .disk{width:44px;height:44px}
.pane .tchip.big .t-digits{font-size:26px}
.pane .sf-hero{gap:var(--s3)}
.pane .sf-card{padding:var(--s2)}
.pane .sf-name{font-size:clamp(18px,3.6vh,32px)}
.pane .sf-check{width:clamp(52px,8vh,76px);height:clamp(52px,8vh,76px)}
.pane .sf-strip{padding:2px 2px 4px}
.pane .sf-step{width:clamp(48px,7vh,64px)}
.pane .tf-face{font-size:clamp(36px,11vh,86px)}
.pane .tf-face.sm{font-size:clamp(24px,6vh,48px)}
.pane .sf-step .cap{display:none}
.pane .token-stage{gap:var(--s3)}
.pane .token-reward .vslot{width:min(16vh,150px)}
.pane .token-msg{font-size:clamp(15px,2.8vh,22px)}
.pane .breath2{width:min(34vh,240px);height:min(34vh,240px)}
.pane .compliance{display:none}
.pane .preset-strip{padding:2px}
.pane .time-input{padding:var(--s2) var(--s3)}
.pane .ti-btns button{width:42px;height:42px;font-size:21px}
.pane .ti-val{font-size:26px;min-width:48px}
.pane .disk.d-mid{width:min(26vh,220px);height:min(26vh,220px)}
.pane .disk.d-hero,.pane .disk.d-max{width:min(30vh,260px);height:min(30vh,260px)}
.pane .disk.d-hero .disk-time,.pane .disk.d-max .disk-time{font-size:clamp(22px,6vh,44px)}
.pane .disk-under{font-size:clamp(17px,3.4vh,28px);padding:5px 18px}
.pane .disk-word{font-size:clamp(15px,3vh,26px)}
.pane .timed-for .vslot{width:min(13vh,110px)}
.pane .timed-for .vlabel{font-size:clamp(12px,2.2vh,18px)}
.pane .reward-ready{transform:scale(1.05)}
.pane .tool-set{gap:var(--s2) var(--s4)}
/* combo fine-tuning: schedule pane breathes, timer pane tightens */
.split[data-combo~="sched"] .pane[data-tool="sched"] .sp-list{padding:var(--s1)}
.split[data-combo~="timer"] .pane[data-tool="timer"] .run-col{gap:var(--s2)}
.split[data-combo~="wait"] .pane[data-tool="wait"] .run-col{gap:var(--s2)}
.split[data-combo~="token"] .pane[data-tool="token"] .token-row{gap:8px}

/* ---------------- Home tag filters ---------------- */
.tag-row{display:flex;gap:var(--s2);justify-content:center;flex-wrap:wrap;padding-bottom:var(--s4);flex:0 0 auto}
.tag-chip{padding:8px 16px;border-radius:var(--r-pill);font-weight:800;font-size:13.5px;
  letter-spacing:.06em;background:var(--surface);color:var(--muted);border:1px solid var(--line);
  transition:background .15s,color .15s,transform .1s}
.tag-chip.on{background:var(--primary);color:#fff;border-color:transparent}
.tag-chip:active{transform:scale(.94)}
.tag-chip .cdot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--gold);margin-right:6px}
.tag-chip.on .cdot{background:#fff}
.tag-add{border-style:dashed;letter-spacing:0}
.tag-name{font-size:22px;max-width:130px;text-transform:uppercase;padding:8px;text-align:center}

/* clinical footer */
.compliance{color:var(--muted);font-size:12.5px;font-weight:600;text-align:center;
  line-height:1.5;opacity:.75;max-width:560px;margin:var(--s2) auto 0;padding:0 var(--s4)}

.recent-row{align-items:center}
.rchip{gap:7px;font-variant-numeric:tabular-nums}
.rchip .ic{width:17px;height:17px;opacity:.6}

.spread{display:flex;justify-content:space-between;align-items:center;gap:var(--s3);flex-wrap:wrap}
.center{text-align:center}

/* ---------------- Notes (the RBT's personal scratchpad) ---------------- */
.note-wrap{max-width:760px;margin:0 auto;width:100%;flex:1;display:flex;flex-direction:column;min-height:0;gap:var(--s3)}
.note-head{display:flex;align-items:center;gap:var(--s3);flex-wrap:wrap}
.note-head h2{font-size:22px;color:var(--primary-deep);flex:1}
.note-client{background:var(--gold-soft);color:#8a6410;border-radius:var(--r-pill);
  padding:5px 14px;font-weight:800;font-size:13px}
.note-phi{font-size:12px;font-weight:700;color:var(--muted);opacity:.8}
.note-chips{display:flex;gap:var(--s2);flex-wrap:wrap}
.note-chips .chip{min-height:44px;padding:8px 15px;font-size:14px}
.note-entry-row{display:flex;gap:var(--s2)}
.note-entry-row input{flex:1;font-family:var(--body);font-weight:700;font-size:16px;
  padding:14px 18px;border-radius:var(--r-pill);border:2px solid var(--line);
  background:var(--surface);color:var(--ink)}
.note-entry-row input:focus{outline:none;border-color:var(--primary)}
.note-list{flex:1;overflow:auto;min-height:0;display:flex;flex-direction:column;gap:var(--s2);padding-bottom:74px;
  padding:var(--s1);transition:filter .3s}
body.locked .note-list,body.locked .note-chips{filter:blur(12px);pointer-events:none}
.note-day{font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;
  color:var(--muted);padding:10px 4px 2px}
.note-item{display:flex;align-items:flex-start;gap:var(--s3);background:var(--surface);
  border:1px solid var(--line);border-radius:var(--r-card);padding:var(--s3) var(--s4)}
.note-item .nt{font-variant-numeric:tabular-nums;font-weight:800;font-size:12.5px;color:var(--muted);
  padding-top:3px;flex:0 0 auto}
.note-item .nc{background:var(--primary-soft);color:var(--primary-deep);font-weight:900;font-size:11px;
  border-radius:6px;padding:2px 7px;margin-top:2px;flex:0 0 auto}
.note-item .ntx{flex:1;font-weight:700;font-size:15px;line-height:1.45;min-width:0;overflow-wrap:anywhere}
.note-item .nx{opacity:.4;padding:2px 8px;border-radius:var(--r-pill);font-size:17px;flex:0 0 auto;transition:background .15s,color .15s}
.note-item .nx:hover{opacity:1;background:rgba(0,0,0,.07)}
.note-item .nx.arm{opacity:1;background:var(--red,#D8695B);background:#D8695B;color:#fff;font-size:12.5px;font-weight:800;padding:5px 10px}
.note-item .npin{opacity:.35;padding:4px 6px;border-radius:8px;flex:0 0 auto;color:var(--muted)}
.note-item .npin:hover{opacity:1;background:var(--surface-2)}
.note-item .npin.on{opacity:1;color:#8a6410;background:var(--gold-soft)}
.note-item .npin .ic{width:16px;height:16px}
.note-item.pinned{border-color:#ecd9a0;background:var(--gold-soft)}
.note-item .ntx{cursor:text;border-radius:8px}
.note-item .ntx:hover{background:var(--surface-2)}
.note-edit{flex:1;min-width:0;font-family:var(--body);font-weight:700;font-size:15px;
  border:2px solid var(--primary);border-radius:10px;padding:6px 10px;background:var(--surface)}
.note-edit:focus{outline:none}
.note-disc{display:flex}
.note-disc .hnote{position:relative;flex:1;display:flex;align-items:center;gap:var(--s3);
  background:var(--surface);border:1px solid var(--line);border-radius:var(--r-card);
  padding:var(--s3) var(--s4)}
.note-disc .hnote .ic{width:24px;height:24px;color:var(--amber);flex:0 0 auto;stroke-width:1.9}
.note-disc .hnote p{margin:0;font-size:12.5px;font-weight:700;color:var(--muted);line-height:1.45}
.note-entry-row textarea{flex:1;font-family:var(--body);font-weight:700;font-size:16px;
  border:2px solid var(--line);border-radius:14px;padding:12px 16px;background:var(--surface);
  resize:none;line-height:1.45;overflow:auto}
.note-entry-row textarea:focus{outline:none;border-color:var(--primary)}
.note-item .ntx{white-space:pre-wrap}
textarea.note-edit{flex:1;min-width:0;font-family:var(--body);font-weight:700;font-size:15px;
  border:2px solid var(--primary);border-radius:10px;padding:6px 10px;background:var(--surface);
  resize:none;line-height:1.45}
.note-chips .chip.tpl{border:1.5px dashed var(--primary);background:var(--primary-soft);color:var(--primary-deep)}
.tplmark{opacity:.6;font-size:12px}
.note-filters{display:flex;gap:var(--s2);flex-wrap:wrap}
.note-filters .chip{min-height:40px;padding:6px 14px;font-size:13.5px}
.note-undo{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:95;
  display:flex;align-items:center;gap:14px;background:var(--ink);color:#fff;
  padding:12px 20px;border-radius:var(--r-pill);font-weight:800;font-size:14px;box-shadow:var(--shadow-lg)}
.note-undo button{color:var(--gold);font-weight:900;font-size:14px;letter-spacing:.02em}
.note-empty{text-align:center;color:var(--muted);font-weight:700;padding:var(--s6) var(--s4);line-height:1.6}
.tip-block{padding:10px 0 4px}
.tip-block h3{font-size:18px;color:var(--primary-deep);margin-bottom:6px;display:flex;align-items:center;gap:10px}
.tip-block .tip-mode{font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;
  background:var(--primary-soft);color:var(--primary-deep);padding:3px 10px;border-radius:var(--r-pill)}
.tip-block p{margin:0;font-weight:600;color:var(--ink);line-height:1.6;font-size:15px}
.tip-block + .tip-block{border-top:1px solid var(--line);margin-top:10px}

/* ============================================================
   V4
   ============================================================ */
/* ---- profile chip: the client IS the app's context ---- */
#profileBtn{display:inline-flex;align-items:center;padding:5px;
  border-radius:var(--r-pill);background:var(--surface-2);border:1px solid transparent;
  flex:0 0 auto;transition:background .15s,transform .1s}
#profileBtn:hover{background:var(--primary-soft)}
#profileBtn:active{transform:scale(.96)}
#profileBtn .pmono{width:40px;height:40px;border-radius:50%;background:var(--primary);color:#fff;
  display:grid;place-items:center;font-family:var(--display);font-weight:600;font-size:13.5px;flex:0 0 auto;
  letter-spacing:.01em}
#profileBtn.noclient .pmono{background:var(--surface);color:var(--muted);border:1.5px dashed var(--line);font-size:11.5px}
/* profile menu */
.pm-row{display:flex;align-items:center;gap:14px;padding:13px 16px;border-radius:var(--r-card);
  background:var(--surface);border:2px solid var(--line);margin-bottom:10px;width:100%;text-align:left;
  transition:border-color .15s,transform .1s}
.pm-row:hover{border-color:var(--primary-soft)}
.pm-row:active{transform:scale(.99)}
.pm-row.on{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
.pm-row .pmono{width:46px;height:46px;border-radius:50%;background:var(--primary);color:#fff;
  display:grid;place-items:center;font-family:var(--display);font-weight:600;font-size:17px;flex:0 0 auto}
.pm-row.none .pmono{background:var(--surface-2);color:var(--muted)}
.pm-row .pt{flex:1;min-width:0}
.pm-row .pt b{font-size:16px}
.pm-row .pt p{margin:2px 0 0;font-size:12.5px;font-weight:700;color:var(--muted);line-height:1.4}
.pm-note{flex:0 0 auto}

/* ---- floating reset: bottom-right, hold-to-fire during runs ---- */
#floatReset{position:fixed;z-index:46;right:calc(12px + env(safe-area-inset-right));
  bottom:calc(12px + env(safe-area-inset-bottom));width:58px;height:58px;border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  background:color-mix(in srgb, var(--surface) 84%, transparent);
  border:1px solid var(--line);box-shadow:var(--shadow);color:var(--muted);
  backdrop-filter:blur(4px);opacity:.8;transition:opacity .2s,transform .12s;overflow:visible}
#floatReset:hover{opacity:1;color:var(--ink)}
#floatReset:active{transform:scale(.94)}
#floatReset .ic{width:21px;height:21px}
#floatAdjust{position:fixed;z-index:46;left:calc(12px + env(safe-area-inset-left));
  bottom:calc(14px + env(safe-area-inset-bottom));width:52px;height:52px;border-radius:50%;
  background:var(--surface);border:1.5px solid var(--line);box-shadow:var(--shadow-lg);
  display:grid;place-items:center;color:var(--primary-deep);transition:transform .12s}
#floatAdjust:hover{transform:translateY(-2px)}
#floatAdjust:active{transform:scale(.94)}
#floatAdjust .ic{width:22px;height:22px}
.adj-foot{margin-top:12px;padding-top:10px;border-top:1px solid var(--line)}
#floatReset .fr-hold{font-size:8px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;line-height:1}
#floatReset svg.fr-ring{position:absolute;inset:-5px;width:calc(100% + 10px);height:calc(100% + 10px);overflow:visible}
#floatReset .fr-ring circle{fill:none;stroke:var(--reserve);stroke-width:3.5;
  stroke-dasharray:100;stroke-dashoffset:100;transform:rotate(-90deg);transform-origin:center}
#floatReset.holding .fr-ring circle{transition:stroke-dashoffset var(--rhold,.8s) linear;stroke-dashoffset:0}
#floatReset.holding{color:var(--reserve);opacity:1}

/* ---- home: two separate standing notes, collapsible to a chip ---- */
.home-notes{flex:0 0 auto;max-width:860px;margin:var(--s4) auto 0;width:100%;
  display:flex;flex-direction:column;gap:8px;position:relative}
.hnote{display:flex;align-items:center;gap:var(--s3);padding:10px var(--s4);
  background:var(--surface);border:1px solid var(--line);border-radius:var(--r-card)}
.hnote .ic{width:24px;height:24px;flex:0 0 auto;stroke-width:1.9}
.hnote.clinical .ic{color:var(--amber)}
.hnote.data .ic{color:var(--primary)}
.hnote p{margin:0;font-size:12.5px;font-weight:700;color:var(--muted);line-height:1.45;flex:1;min-width:0}
.hnote p b{color:var(--primary-deep)}
.hnote button{font-weight:800;font-size:12.5px;color:var(--primary-deep);flex:0 0 auto;
  padding:7px 13px;border-radius:var(--r-pill);background:var(--primary-soft)}
.hnote button:hover{background:var(--primary);color:#fff}
.hn-collapse{position:absolute;top:-11px;right:-6px;width:26px;height:26px;border-radius:50%;
  background:var(--surface);border:1px solid var(--line);color:var(--muted);display:grid;place-items:center;
  font-size:13px;box-shadow:var(--shadow)}
.hn-collapse:hover{color:var(--ink)}
.hn-mini{align-self:flex-start;width:46px;height:46px;border-radius:50%;display:grid;place-items:center;
  background:var(--surface);border:1px solid var(--line);box-shadow:var(--shadow);color:var(--amber);
  transition:transform .12s}
.hn-mini:hover{transform:translateY(-1px)}
.hn-mini .ic{width:23px;height:23px;stroke-width:2}

/* Notes tile spans two slots */
.mode-tile[data-key=note]{grid-column:span 2}
@media (max-width:540px){.mode-tile[data-key=note]{grid-column:span 1}}

/* ---- First slightly leads Then ---- */
.ft-wrap .ft-col:first-child{flex:1.14}
.ft-wrap .ft-col:not(:first-child){flex:.9}

/* ---- wait dock: pause centered, small restart at the right ---- */
.wait-dock{position:relative;width:100%;justify-content:center;padding:0 96px;min-height:52px}
.wait-dock .wait-restart{position:absolute;right:88px;top:50%;transform:translateY(-50%)}
.wait-dock .wait-restart:active{transform:translateY(-50%) scale(.95)}
@media (max-width:520px){.wait-dock{padding:0 72px}.wait-dock .wait-restart{right:66px}}

/* ---- schedule v4: blank-circle checks, error X, clean done rows ---- */
.sp-check.todo{background:var(--surface);color:transparent;border:3px solid var(--line)}
.sp-check.todo:hover{border-color:var(--primary);background:var(--primary-soft)}
.sp-check.done-mark{border:none}
.sp-item.err{opacity:.62;border-color:transparent;background:#F7DEDA}
.sp-item.err .thumb{filter:grayscale(.6)}
.sp-check.err-mark{background:#F2CFC9;color:var(--reserve);border:none}
.sf-step.err .th{opacity:.55}
.sf-step.err .th::after{content:"";position:absolute;inset:0;background:rgba(216,105,91,.25)}
.sf-step.err .th::before{content:"✕";position:absolute;z-index:1;color:#fff;font-weight:900;
  font-size:1.3em;text-shadow:0 1px 3px rgba(0,0,0,.3)}
.sf-checkline{flex:0 0 auto;display:flex;justify-content:center;padding:2px 0}
/* turns focus view rides the schedule-focus look */
.tf-wrap .turn-banner{margin:0 auto}
button.sf-card{cursor:pointer;font:inherit;color:inherit;text-align:center}
button.sf-card:active{transform:scale(.985)}
.tf-hero{border-color:var(--amber)}
.tf-hero.time-up{animation:turnFlash .55s ease-in-out 2;box-shadow:0 0 0 4px var(--amber),var(--shadow-lg)}
.tf-face{flex:1;min-height:0;display:grid;place-items:center;font-family:var(--display);font-weight:600;
  font-size:clamp(64px,26vh,220px);line-height:1;color:var(--ink)}
.tf-face.sm{font-size:clamp(36px,10vh,90px)}
.sf-step .th.face{font-size:26px}
.tf-wrap .sf-step.now .th{border-color:var(--amber);box-shadow:0 0 0 3px var(--amber-soft)}
/* drag reorder */
.sched-item{touch-action:pan-y}
.sched-item .grip{width:34px;height:46px;display:grid;place-items:center;color:var(--muted);
  cursor:grab;flex:0 0 auto;touch-action:none}
.sched-item.dragging{opacity:.9;box-shadow:var(--shadow-lg);position:relative;z-index:5;border-color:var(--primary);transition:none !important}

/* ---- in-tool adjustments panel ---- */
.adj-scrim{position:fixed;inset:0;z-index:44;background:rgba(20,28,30,.14)}
.adj{z-index:45;position:fixed;left:50%;bottom:calc(16px + env(safe-area-inset-bottom));transform:translateX(-50%);
  background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);
  box-shadow:var(--shadow-lg);padding:var(--s4) var(--s5);width:min(640px,94%);
  animation:popIn .22s cubic-bezier(.2,.9,.25,1)}
.adj.fading{opacity:0;transition:opacity .5s}
.adj.duo{bottom:auto;top:50%;transform:translate(-50%,-50%);width:min(720px,96%);max-height:86%;overflow:auto}
.adj-head{display:flex;align-items:center;gap:var(--s3);margin-bottom:var(--s3)}
.adj-head .t{font-family:var(--display);font-weight:600;font-size:16px;color:var(--primary-deep);flex:1}
.adj-tabs{display:flex;gap:6px}
.adj-tabs button{padding:8px 16px;border-radius:var(--r-pill);font-weight:800;font-size:13.5px;
  background:var(--surface-2);color:var(--muted)}
.adj-tabs button.on{background:var(--primary);color:#fff}
.adj-body .row{margin-bottom:var(--s2)}
.adj-body .label{min-width:74px}
body.reduce-motion .adj{animation:none}

/* ---- notes: BCBA tags highlighted, own tags neutral; per-note copy ---- */

.note-item .ncopy{opacity:.4;padding:4px 6px;border-radius:8px;flex:0 0 auto;color:var(--muted)}
.note-item .ncopy:hover{opacity:1;background:var(--surface-2);color:var(--primary-deep)}
.note-item .ncopy .ic{width:16px;height:16px}

/* ---- picker search ---- */
.pick-search{width:100%;font-family:var(--body);font-weight:700;font-size:15px;padding:12px 16px;
  border-radius:var(--r-pill);border:2px solid var(--line);background:var(--surface);color:var(--ink);
  margin-bottom:var(--s3)}
.pick-search:focus{outline:none;border-color:var(--primary)}

/* ---- choice setup: fixed count stepper, uniform grid ---- */
.count-row{display:flex;align-items:center;gap:var(--s3);justify-content:center;margin-bottom:var(--s4)}
.count-row .cnum{font-family:var(--display);font-weight:600;font-size:24px;min-width:130px;text-align:center}
.choice-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:var(--s3)}
.choice-grid .vslot{width:100%}

/* version badge */
.vbadge{display:inline-block;background:var(--primary-soft);color:var(--primary-deep);border-radius:8px;
  padding:2px 8px;font-weight:900;font-size:11px;letter-spacing:.06em;vertical-align:middle}

/* ============================================================
   1.0
   ============================================================ */
/* hold a visual → it swells for attention until released */
.magnify{transform:scale(1.32) !important;z-index:8;transition:transform .28s cubic-bezier(.2,.9,.3,1.2) !important;
  box-shadow:var(--shadow-lg) !important}
.ft-col.magnify{transform:scale(1.18) !important}
body.reduce-motion .magnify{transition:none !important}

/* pane reset gets the same hold ring */
.pane-reset{overflow:visible}
.pane-reset .pr-ring{position:absolute;inset:-4px;width:calc(100% + 8px);height:calc(100% + 8px);overflow:visible;pointer-events:none}
.pane-reset .pr-ring circle{fill:none;stroke:var(--reserve);stroke-width:3;
  stroke-dasharray:100;stroke-dashoffset:100;transform:rotate(-90deg);transform-origin:center}
.pane-reset.holding .pr-ring circle{transition:stroke-dashoffset var(--rhold,.8s) linear;stroke-dashoffset:0}
.pane-reset.holding{color:var(--reserve);opacity:1}

/* turns: the queue reads at a glance */
.turn-card{position:relative}
.turn-card.next-up{opacity:.82}
.turn-card .t-next,.turn-card .t-paused{position:absolute;top:5px;left:50%;transform:translateX(-50%);z-index:2;
  border-radius:var(--r-pill);padding:2px 13px;font-weight:900;font-size:11.5px;letter-spacing:.08em;
  text-transform:uppercase;box-shadow:var(--shadow);white-space:nowrap}
.turn-card .t-next{background:var(--amber-soft);color:#9a5a2f;border:1px solid #f0cba8}
.turn-card .t-paused{background:var(--surface-2);color:var(--muted);border:1px solid var(--line)}
.turn-card.pausedp{opacity:.3;filter:grayscale(.7)}

/* notes tile: live count */
.tile-sub{font-size:12.5px;font-weight:800;color:var(--muted);white-space:nowrap;flex:0 0 auto}

/* per-tool BCBA note bubble on setup screens */
.tool-note{max-width:820px;margin:0 auto var(--s3);width:100%;display:flex;gap:10px;align-items:flex-start;
  background:var(--gold-soft);border:1px solid #ecd9a0;border-radius:var(--r-card);padding:11px 16px}
.tool-note .ic{width:19px;height:19px;color:#8a6410;flex:0 0 auto;margin-top:2px}
.tool-note p{margin:0;font-size:13.5px;font-weight:700;color:#7a5a18;line-height:1.5;flex:1;min-width:0;
  white-space:pre-wrap;overflow-wrap:anywhere}
.tool-note .tn-badge{font-size:10.5px;font-weight:900;letter-spacing:.06em;background:#e7cf92;color:#6b4e10;
  border-radius:6px;padding:2px 7px;flex:0 0 auto;margin-top:1px}

/* BCBA limits line on setups */
.limit-line{font-size:12.5px;font-weight:800;color:var(--primary-deep);background:var(--primary-soft);
  border-radius:var(--r-pill);padding:6px 14px;display:inline-flex;align-items:center;gap:7px}
.chip.limit-off{opacity:.3;pointer-events:none}

/* picker pinned recents */
.pin-row{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 10px;align-items:center}
.pin-row .pick-item{flex:0 0 78px;width:78px;aspect-ratio:1}
.pin-row .emoji-cell{flex:0 0 58px;width:58px;aspect-ratio:1;font-size:30px}
.pin-row .chip{flex:0 0 auto}

</style>

<script>
/* ============================================================
   RBT TOOLS — v2
   Persistent supports · global timers · one design voice
   ============================================================ */
'use strict';

/* ---------- helpers ---------- */
const $  = (s, r = document) => r.querySelector(s);
const $$ = (s, r = document) => [...r.querySelectorAll(s)];
const el = (tag, cls, html) => { const n = document.createElement(tag); if (cls) n.className = cls; if (html != null) n.innerHTML = html; return n; };
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const now = () => Date.now();
const stage = () => $('#stage');
const modalRoot = () => $('#modalRoot');
const deepCopy = (o) => JSON.parse(JSON.stringify(o));
const fmt2 = (ms) => { const s = Math.max(0, Math.ceil(ms / 1000)); return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`; };
const fmtSecs = (secs) => secs < 60 ? secs + 's' : fmt2(secs * 1000);
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));

/* ---------- the words the app stands behind ---------- */
const DISCLAIMER = {
  short: 'Supports sessions only — always follow each client’s individual programming and collect data as prescribed.',
  full: [
    'This app puts shared visual supports — timers, schedules, token boards and more — on one screen for ABA sessions.',
    'It is a support, not a program. It never replaces a client’s individualized programming, BCBA or intern direction, supervision, or required data collection (e.g., in CentralReach). When anything here conflicts with a client’s plan, the plan wins.',
    'Keep client privacy protected: clients appear only as their color-animal code. Never store names, photos of clients, or any other identifying information in this app or in client folders.',
  ],
};

/* ---------- storage that never throws ---------- */
const LS = (() => {
  try { const t = window.localStorage; const k = '__rbt_probe'; t.setItem(k, '1'); t.removeItem(k); return t; }
  catch { const mem = new Map(); return { getItem: k => mem.has(k) ? mem.get(k) : null, setItem: (k, v) => { mem.set(k, String(v)); }, removeItem: k => { mem.delete(k); } }; }
})();
/* one-time migration from the app's previous name — data carries over silently */
(function migrateLS() {
  try {
    if (LS.getItem('rbt.migrated')) return;
    ['settings', 'presets', 'recents', 'split', 'myEmoji'].forEach(k => {
      const old = LS.getItem('steady.' + k);
      if (old != null && LS.getItem('rbt.' + k) == null) LS.setItem('rbt.' + k, old);
    });
    LS.setItem('rbt.migrated', '1');
  } catch {}
})();

/* ---------- settings ---------- */
const APP_VERSION = 8; // shown to people as "1.03"
const APP_VERSION_LABEL = '1.03';
const DEFAULTS = {
  theme: 'standard', fun: 'on', sound: true, volume: 0.7, reduceMotion: false,
  endingSound: 'marimba', // marimba · bells · musicbox · off — always the extended, gentle ringer
  lockHold: 1.6,
  autoFS: true, autoLock: false, unlockDone: true, duoLink: false,
  idleMin: 5, // minutes between idle reminder pings; 0 = off
  tips: true, // the ? button on the top bar
  _v: APP_VERSION,
};
const Store = {
  s: {},
  load() {
    let raw = {};
    try { raw = JSON.parse(LS.getItem('rbt.settings') || '{}') || {}; } catch {}
    this.s = { ...DEFAULTS, ...raw };
    /* 1.01 migration: one celebration, curated ringers, fewer knobs */
    if (this.s.fun !== 'off') this.s.fun = 'on';
    const endMap = { chime: 'marimba', bell: 'bells', repeat: 'marimba', none: 'off' };
    if (endMap[this.s.endingSound]) this.s.endingSound = endMap[this.s.endingSound];
    if (!['marimba', 'bells', 'musicbox', 'off'].includes(this.s.endingSound)) this.s.endingSound = 'marimba';
    if ((raw._v || 0) < 6) { this.s.duoLink = false; this.s.tips = true; }
    this.s._v = APP_VERSION;
    ['cadence', 'endingStyle', 'panelClose'].forEach(k => delete this.s[k]);
  },
  save() { try { LS.setItem('rbt.settings', JSON.stringify(this.s)); } catch {} this.apply(); },
  apply() {
    const live = document.body.classList.contains('tool-live');
    document.body.className = `theme-${this.get('theme')}` + (this.get('reduceMotion') ? ' reduce-motion' : '') + (Lock.on ? ' locked' : '') + (live ? ' tool-live' : '');
    const m = $('meta[name=theme-color]'); if (m) m.setAttribute('content', this.get('theme') === 'contrast' ? '#0E1416' : '#2E8B94');
  },
  get(k) { return this.s[k]; },
  set(k, v) { this.s[k] = v; this.save(); },
};

/* ---------- presets (per tool; client presets carry a badge) ---------- */
const KEYMAP = { 'first-then': 'ft', schedule: 'sched' };
const Presets = {
  all: {},
  load() {
    try { this.all = JSON.parse(LS.getItem('rbt.presets') || '{}'); } catch { this.all = {}; }
    Object.entries(KEYMAP).forEach(([o, n]) => { if (this.all[o]) { (this.all[n] ||= []).push(...this.all[o]); delete this.all[o]; } });
  },
  save() { try { LS.setItem('rbt.presets', JSON.stringify(this.all)); } catch {} },
  list(mode) { return this.all[mode] || []; },
  add(mode, name, data, client) { const p = { name, data, ts: Date.now() }; if (client) p.client = client; (this.all[mode] ||= []).push(p); this.save(); },

/* ---------- image import pipeline ---------- */
async function processImageFile(file) {
  const bitmap = await createImageBitmap(file, { imageOrientation: 'from-image' }).catch(async () => {
    const img = new Image(); img.src = URL.createObjectURL(file); await img.decode(); return img;
  });
  let w = bitmap.width, h = bitmap.height;
  let c = document.createElement('canvas'); c.width = w; c.height = h;
  c.getContext('2d').drawImage(bitmap, 0, 0);
  const trim = detectTrim(c.getContext('2d'), w, h);
  let fit = 'cover';
  if (trim && trim.frac > 0.06) {
    const pad = Math.round(Math.min(trim.w, trim.h) * 0.06);
    const l = Math.max(0, trim.l - pad), t = Math.max(0, trim.t - pad);
    const rr = Math.min(w, trim.r + pad), bb = Math.min(h, trim.b + pad);
    const c2 = document.createElement('canvas'); c2.width = rr - l; c2.height = bb - t;
    c2.getContext('2d').drawImage(c, l, t, c2.width, c2.height, 0, 0, c2.width, c2.height);
    c = c2; w = c2.width; h = c2.height; fit = 'contain';
  }
  const MAX = 900, scale = Math.min(1, MAX / Math.max(w, h));
  if (scale < 1) { const c3 = document.createElement('canvas'); c3.width = Math.round(w * scale); c3.height = Math.round(h * scale); c3.getContext('2d').drawImage(c, 0, 0, c3.width, c3.height); c = c3; }
  const blob = await new Promise(res => c.toBlob(res, 'image/jpeg', 0.85));
  return { blob, fit };
}
function detectTrim(ctx, w, h) {
  try {
    const d = ctx.getImageData(0, 0, w, h).data;
    const corner = [d[0], d[1], d[2]];
    if (!(corner[0] > 238 && corner[1] > 238 && corner[2] > 238)) return null;
    const isBg = (x, y) => { const i = (y * w + x) * 4; return Math.abs(d[i] - corner[0]) < 16 && Math.abs(d[i + 1] - corner[1]) < 16 && Math.abs(d[i + 2] - corner[2]) < 16 && d[i + 3] > 200; };
    let l = w, r = 0, t = h, b = 0, step = Math.max(1, Math.floor(Math.min(w, h) / 400));
    for (let y = 0; y < h; y += step) for (let x = 0; x < w; x += step) if (!isBg(x, y)) { if (x < l) l = x; if (x > r) r = x; if (y < t) t = y; if (y > b) b = y; }
    if (r <= l || b <= t) return null;
    return { l, t, r, b, w: r - l, h: b - t, frac: 1 - ((r - l) * (b - t)) / (w * h) };
  } catch { return null; }
}
