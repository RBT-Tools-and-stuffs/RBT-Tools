/* ---------- sound — one warm mallet family, synthesized live ----------
   Layered partials + a generated room tail make it feel like a real
   instrument instead of a beeper. No samples, still one file. */
const Sound = {
  ctx: null, master: null, verb: null,
  ensure() {
    if (!this.ctx) { try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      const c = this.ctx;
      this.master = c.createGain(); this.master.gain.value = 1; this.master.connect(c.destination);
      /* a soft room: 1.4s of decaying noise as a reverb impulse */
      const len = Math.floor(c.sampleRate * 1.4), imp = c.createBuffer(2, len, c.sampleRate);
      for (let ch = 0; ch < 2; ch++) { const d = imp.getChannelData(ch);
        for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.6); }
      this.verb = c.createConvolver(); this.verb.buffer = imp;
      const wet = c.createGain(); wet.gain.value = 0.18;
      this.verb.connect(wet); wet.connect(this.master);
    } catch {} }
    if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
  },
  /* one struck note: partial stack → lowpass that darkens as it rings out */
  note(freq, { when = 0, dur = 0.9, gain = 1, partials = [[1, 1], [3.98, 0.2]], type = 'sine', bright = 2400, detune = 4 } = {}) {
    if (!Store.get('sound')) return; this.ensure(); if (!this.ctx) return;
    try {
      const c = this.ctx, t0 = c.currentTime + when;
      const vol = Store.get('volume') * gain;
      const g = c.createGain();
      g.gain.setValueAtTime(0, t0);
      g.gain.linearRampToValueAtTime(vol * 0.42, t0 + 0.008);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      const lp = c.createBiquadFilter(); lp.type = 'lowpass';
      lp.frequency.setValueAtTime(bright, t0);
      lp.frequency.exponentialRampToValueAtTime(Math.max(500, bright * 0.32), t0 + dur * 0.7);
      g.connect(lp); lp.connect(this.master); if (this.verb) lp.connect(this.verb);
      partials.forEach(([m, a]) => {
        const o = c.createOscillator(); o.type = type; o.frequency.value = freq * m;
        if (detune) o.detune.value = (Math.random() * 2 - 1) * detune;
        const pg = c.createGain(); pg.gain.value = a;
        o.connect(pg); pg.connect(g);
        o.start(t0); o.stop(t0 + dur + 0.05);
      });
    } catch {}
  },
  /* the three voices */
  marimba(f, when = 0, g = 1, dur = 1.0) { this.note(f, { when, dur, gain: g, partials: [[1, 1], [3.98, 0.22], [10.1, 0.04]], bright: 2200 }); },
  music(f, when = 0, g = 1, dur = 1.5)   { this.note(f, { when, dur, gain: g * 0.8, partials: [[1, 1], [2.76, 0.32], [5.4, 0.1]], bright: 4200, detune: 6 }); },
  bell(f, when = 0, g = 1, dur = 2.4)    { this.note(f, { when, dur, gain: g * 0.65, partials: [[1, 1], [2, 0.5], [3, 0.26], [4.2, 0.08]], bright: 3000, detune: 3 }); },
  /* quiet UI voices — same instrument, softer touch */
  tick()   { this.note(880, { dur: 0.06, gain: 0.14, partials: [[1, 1]], bright: 1600 }); },
  soft()   { this.marimba(392, 0, 0.3, 0.35); },
  add()    { this.marimba(523, 0, 0.55, 0.5); this.marimba(784, 0.07, 0.4, 0.6); },
  choose() { this.marimba(494, 0, 0.4, 0.4); this.marimba(740, 0.08, 0.4, 0.55); },
  sweep()  { [523, 659, 784].forEach((f, i) => this.marimba(f, i * 0.09, 0.4, 0.55)); },
  success(){ [523, 659, 784, 1046].forEach((f, i) => this.marimba(f, i * 0.1, 0.5, 0.9)); },
  ping()   { this.marimba(880, 0, 0.4, 0.6); this.marimba(880, 0.45, 0.3, 0.6); },
  /* the ending phrase — a gentle, expressive ~2.5s melody per voice */
  PHRASES: {
    marimba(S) { [[392, 0], [523, 0.22], [659, 0.44], [784, 0.72], [659, 1.15], [784, 1.38], [1046, 1.66]].forEach(([f, w]) => S.marimba(f, w, 0.6, 1.1)); },
    bells(S)   { [[523, 0], [659, 0.5], [784, 1.0], [1046, 1.55]].forEach(([f, w]) => S.bell(f, w, 0.5, 2.1)); },
    musicbox(S){ [[659, 0], [784, 0.18], [1046, 0.36], [784, 0.62], [659, 0.88], [523, 1.12], [659, 1.5]].forEach(([f, w]) => S.music(f, w, 0.55, 1.35)); },
  },
  phrase(voice) { const p = this.PHRASES[voice || Store.get('endingSound')]; if (p) p(this); },
  /* a finish that stays gentle but refuses to be missed: the phrase plays,
     then repeats every few seconds until someone touches the screen.
     maxMs caps it — turn-taking passes after one phrase so the game keeps moving. */
  ending(maxMs) {
    const v = Store.get('endingSound'); if (v === 'off') return;
    this.phrase(v);
    if (maxMs == null || maxMs > 4000) Alarm.start(maxMs);
  },
};
const Alarm = {
  id: 0, until: 0,
  start(maxMs) {
    this.stop();
    this.until = Date.now() + Math.min(maxMs || 60000, 60000); // a minute of patience, tops
    this.id = setInterval(() => {
      if (Date.now() >= this.until - 100) return this.stop();
      Sound.phrase();
    }, 4600);
  },
  stop() { if (this.id) { clearInterval(this.id); this.id = 0; } this.until = 0; },
};

/* the bar must NEVER clip: shed labels → shorten → tighten → drop oldest tabs */
function fitTopbar() {

  tabs.forEach(t => { t.classList.remove('tab-hide'); const s = $('.tlabel', t); if (s) s.textContent = TITLE[t.dataset.key]; });
  requestAnimationFrame(() => {

  const t = hiddenTs[0];
  const key = t ? `${t.id}|${t.done}|${t.done ? '' : fmt2(Timers.remaining(t))}|${hiddenTs.length}|${visible.join()}` : '';

function wireFloatReset() {
  const b = $('#floatReset'); if (!b || b._wired) return; b._wired = true;
  let t = 0, fired = false, downAt = 0, px = 0, py = 0;
  const fire = () => {
    fired = true;
    const key = b._key;
    resetTool(key, { clear: !b._hold });
    Sound.soft();
    show(key);
  };
  b.addEventListener('pointerdown', (e) => {
    e.preventDefault(); fired = false; downAt = Date.now(); px = e.clientX; py = e.clientY;
    if (!b._hold) return; // tap mode resolves on click
    try { b.setPointerCapture(e.pointerId); } catch {}
    b.classList.add('holding');
    t = setTimeout(() => { b.classList.remove('holding'); fire(); }, 800);
  });
  const cancel = () => {
    if (!b._hold) return;
    b.classList.remove('holding');
    if (t) { clearTimeout(t); t = 0; }
  };
  b.addEventListener('pointerup', () => {
    const wasHeld = b._hold; cancel();
    if (wasHeld && !fired) {
      /* quick tap: pass through to whatever the button is covering; else coach the hold */
      if (Date.now() - downAt < 380 && clickThrough(b, px, py)) return;
      flash('Hold to reset');
    }
  });
  b.addEventListener('pointerleave', cancel);
  b.addEventListener('pointercancel', cancel);
  b.addEventListener('click', () => { if (!b._hold && !fired) fire(); });

/* ---------- preset loading (with old-shape migration) ---------- */
function migrateCfg(mode, data) {
  if (mode === 'timer') {
    if (data.minutes != null && data.m == null) { data.m = data.minutes; data.s = data.seconds || 0; }
    if (data.style === 'disk') data.style = 'ring';
    if (!['pie', 'ring', 'digits'].includes(data.style)) data.style = 'pie';
    if (data.showNum == null) data.showNum = true;
    if (!data.moreS) data.moreS = 60;
  }
  if (mode === 'wait' && data.seconds != null && data.m == null) { data.m = Math.floor(data.seconds / 60); data.s = data.seconds % 60; }
  if (mode === 'ft') { delete data.mins; delete data.tokens; delete data.firstMinutes; }
  if (mode === 'sched' && !data.mode) data.mode = 'list';
  if (mode === 'turn') { if (Array.isArray(data.people)) data.people = data.people.map(p => ({ name: p.name || '', v: p.v || null })); if (!['focus', 'grid'].includes(data.view)) data.view = 'focus'; }
  return data;
}
function applyPreset(mode, data) {
  const st = MS[mode]; if (!st) return;
  st.cfg = { ...MS_DEF[mode](), ...migrateCfg(mode, deepCopy(data)) };
  st.phase = 'setup';
  Timers.stopByMode(mode);
  show(mode);
}

    if (!(cRec && pr.name === cRec.name)) chip.appendChild(document.createTextNode(pr.name));
    const x = el('span', 'px', '×');

}

  /* one listener on the stage: EVERY patch of empty space is a handle, in single or duo */
  wireStage() {
    const stEl = stage(); if (!stEl || stEl._adjWired) return; stEl._adjWired = true;
    let t = 0, sx = 0, sy = 0;
    stEl.addEventListener('pointerdown', (e) => {
      if (Lock.on || this.overlay) return;
      const keys = currentKeys().filter(k => k !== 'home' && k !== 'calm' && k !== 'note');
      if (!keys.length) return;
      if (e.target.closest('button,.vslot,input,textarea,.tchip,.token,.choice-card,.turn-card,.sp-item,.sf-card,.sf-strip,.sf-next,.sched-item,.magnify-t,.modal-scrim,.adj,.dock,#floatReset,#floatLock,.note-item,.preset-strip,.panel,.time-input,.split-div')) return;
      /* in duo, the pane under the finger leads the panel */
      const pane = e.target.closest('.pane');
      if (pane && pane.dataset.tool) { const k = pane.dataset.tool; const ix = keys.indexOf(k); if (ix > 0) { keys.splice(ix, 1); keys.unshift(k); } }
      sx = e.clientX; sy = e.clientY;
      const mv = (ev) => { if (Math.hypot(ev.clientX - sx, ev.clientY - sy) > 22) cleanup(); };
      const cleanup = () => { clearTimeout(t); stEl.removeEventListener('pointermove', mv);
        stEl.removeEventListener('pointerup', cleanup); stEl.removeEventListener('pointercancel', cleanup); };
      stEl.addEventListener('pointermove', mv);

      stEl.addEventListener('pointercancel', cleanup);
      t = setTimeout(() => { cleanup(); this.show(keys); }, 550);
    });
  },
  show(keys) {
    const live = keys.filter(k => AdjustUI[k] && MS[k] && MS[k].phase === 'run');
    if (!live.length) return;
    this.close();
    const scrim = el('div', 'adj-scrim');
    scrim.onclick = () => this.close();
    const panel = el('div', 'adj' + (live.length > 1 ? ' duo' : ''));
    const head = el('div', 'adj-head');
    const title = el('div', 't');
    head.appendChild(title);
    let tabs = null;
    if (live.length > 1) {
      tabs = el('div', 'adj-tabs');
      head.appendChild(tabs);
    }
    const x = el('button', 'x-btn', '<svg viewBox="0 0 24 24" class="ic"><path d="M6 6l12 12M18 6L6 18"/></svg>');
    x.onclick = () => this.close();
    head.appendChild(x);
    const body = el('div', 'adj-body');
    panel.append(head, body);
    const paint = (key) => {
      title.textContent = 'Adjust ' + (TITLE[key] || '');
      body.innerHTML = '';
      AdjustUI[key](body, () => this.close());
      this.foot(body, key, () => this.close());
      if (tabs) $$('button', tabs).forEach(b2 => b2.classList.toggle('on', b2.dataset.k === key));
      this.touch();
    };
    if (tabs) live.forEach(k => {
      const tb = el('button', '', esc(TITLE[k])); tb.dataset.k = k;
      tb.onclick = () => paint(k);
      tabs.appendChild(tb);
    });
    document.body.append(scrim, panel);
    this.overlay = { scrim, panel };
    panel.addEventListener('pointerdown', () => this.touch());
    paint(live[0]);
  },
  /* every panel ends the same way: a road back to the setup screen */
  foot(body, key, close) {
    const foot = el('div', 'row adj-foot');
    const back = el('button', 'chip', '↩ Back to setup');
    back.title = 'End the run, keep everything set up';
    back.onclick = () => { close(); resetTool(key, { clear: false }); show(key); Sound.soft(); };
    foot.appendChild(back);
    body.appendChild(foot);

  touch() {}, // panels stay until dismissed — nothing vanishes mid-read

  },

/* pointer-based drag reorder — the dragged row rides the finger on a transform,

   (No mid-drag rebuilds → no lost pointer capture → no jitter.) */
function wireSchedDrag(grip, row, list, cfg, redraw) {
  grip.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    const rows = $$('.sched-item', list);
    const from = +row.dataset.ix;
    if (rows.length < 2) return;
    const r0 = rows[0].getBoundingClientRect();
    const stepH = rows.length > 1 ? rows[1].getBoundingClientRect().top - r0.top : r0.height + 8;
    let to = from;
    try { grip.setPointerCapture(e.pointerId); } catch {}
    row.classList.add('dragging');
    rows.forEach(r => { if (r !== row) r.style.transition = 'transform .18s ease'; });
    const y0 = e.clientY;
    const move = (ev) => {
      const dy = ev.clientY - y0;
      row.style.transform = `translateY(${dy}px) scale(1.02)`;
      let t2 = Math.max(0, Math.min(rows.length - 1, from + Math.round(dy / stepH)));

          if (r === row) return;

          let shift = 0;
          if (from < to && ix > from && ix <= to) shift = -stepH;
          else if (from > to && ix >= to && ix < from) shift = stepH;

const DuoLink = {
  enabled() { return Split.on && Store.get('duoLink'); },
  onTimerEnd(t) {
    if (!this.enabled()) return;
    if ((t.modeKey === 'timer' || t.modeKey === 'wait') && Split.has(t.modeKey)) {
      const other = Split.other(t.modeKey);
      if (other === 'ft' && MS.ft.phase === 'run') {
        setTimeout(() => { if (ftAdvanceState()) flash(MS.ft.phase === 'done' ? 'Timer done — all steps finished!' : 'Timer done — moving on'); }, 500);
      }
      /* schedule + timer in Duo: the timer IS the step timer */
      if (t.modeKey === 'timer' && other === 'sched' && MS.sched.phase === 'run') {
        setTimeout(() => { if (MS.sched.phase === 'run') { schedMark(MS.sched, 'ok'); flash('Timer done — next step'); } }, 500);
      }
    }
  },
  /* schedule advanced → wind the paired timer back up for the new step */
  onSchedStep() {
    if (!this.enabled() || !Split.has('sched')) return;
    if (Split.other('sched') !== 'timer') return;
    const st = MS.timer;
    if (st.phase === 'run') {
      const t = Timers.byMode('timer');
      if (t) { Timers.restart(t); if (!t.running) Timers.start(t); rerender('timer'); }
    } else if (st.phase === 'setup' && MS.sched.phase === 'run') {
      const secs = st.cfg.m * 60 + st.cfg.s;
      if (secs >= 5) {
        const t = Timers.create({ modeKey: 'timer', seconds: secs });
        Timers.start(t); st.phase = 'run'; rerender('timer');
        flash('Step timer started');
      }
    }
  },
  onTokensWon() {
    if (!this.enabled() || !Split.has('token')) return;
    const other = Split.other('token');
    if (other === 'timer' && MS.timer.phase === 'setup') {
      const cfg = MS.timer.cfg;
      const secs = cfg.m * 60 + cfg.s;
      if (secs < 5) return;
      const t = Timers.create({ modeKey: 'timer', seconds: secs });
      Timers.start(t); MS.timer.phase = 'run';
      renderPane('timer');
      flash('Board full — reward timer started');
    }
  },
  onChoiceChosen(pick) {
    if (!this.enabled() || !Split.has('choice')) return;
    const other = Split.other('choice');
    if (other === 'ft' && MS.ft.phase === 'setup' && !MS.ft.cfg.then) {
      MS.ft.cfg.then = deepCopy(pick);
      renderPane('ft');
      flash(`“${visualLabel(pick) || 'Choice'}” set as Then`);
    }
  },
};

function extOf(p) { const m = p.toLowerCase().match(/\.([a-z0-9]+)$/); return m ? m[1] : ''; }

function cleanLabel(name) {

async function inflateRaw(bytes) {
  const ds = new DecompressionStream('deflate-raw');
  const buf = await new Response(new Blob([bytes]).stream().pipeThrough(ds)).arrayBuffer();
  return new Uint8Array(buf);
}
async function unzipAll(arrayBuffer) {
  const u8 = new Uint8Array(arrayBuffer);
  const dv = new DataView(arrayBuffer);
  let eocd = -1;
  const min = Math.max(0, u8.length - 66000);
  for (let i = u8.length - 22; i >= min; i--) {
    if (u8[i] === 0x50 && u8[i + 1] === 0x4b && u8[i + 2] === 0x05 && u8[i + 3] === 0x06) { eocd = i; break; }
  }
  if (eocd < 0) throw new Error('That file does not look like a .zip.');
  const count = dv.getUint16(eocd + 10, true);
  let off = dv.getUint32(eocd + 16, true);
  const td = new TextDecoder();
  const out = [];
  for (let n = 0; n < count; n++) {
    if (dv.getUint32(off, true) !== 0x02014b50) break;
    const method = dv.getUint16(off + 10, true);
    const compSize = dv.getUint32(off + 20, true);
    const nameLen = dv.getUint16(off + 28, true);
    const extraLen = dv.getUint16(off + 30, true);
    const commentLen = dv.getUint16(off + 32, true);
    const localOff = dv.getUint32(off + 42, true);
    const name = td.decode(u8.subarray(off + 46, off + 46 + nameLen));
    off += 46 + nameLen + extraLen + commentLen;
    if (name.endsWith('/')) continue;
    if (compSize > 60 * 1024 * 1024) continue; // safety valve
    const lNameLen = dv.getUint16(localOff + 26, true);
    const lExtraLen = dv.getUint16(localOff + 28, true);
    const start = localOff + 30 + lNameLen + lExtraLen;
    const raw = u8.subarray(start, start + compSize);
    let data;
    if (method === 0) data = raw.slice();
    else if (method === 8) {
      if (typeof DecompressionStream === 'undefined') throw new Error('This browser cannot unzip — please update Chrome.');
      data = await inflateRaw(raw);
    } else continue;
    out.push({ path: name, data });
  }
  return out;
}

    if (source.zipFile) {
      const buf = await source.zipFile.arrayBuffer();
      entries = (await unzipAll(buf)).map(e => ({ path: e.path, data: e.data }));
    } else {
      for (const f of source.folderFiles) entries.push({ path: f.webkitRelativePath || f.name, file: f });
    }
    entries = entries
      .map(e => ({ ...e, path: e.path.replace(/\\/g, '/').replace(/^\.\//, '') }))
      .filter(e => !e.path.includes('__MACOSX') && !e.path.split('/').some(seg => seg.startsWith('.')));
    const confs = entries.filter(e => baseName(e.path).toLowerCase() === 'client.json')
      .sort((a, b) => a.path.split('/').length - b.path.split('/').length);
    if (!confs.length) throw new Error('No client.json found — this folder needs an export from the Client Profiles app.');
    const parse = async (conf) => {
      const base = conf.path.split('/').slice(0, -1).join('/');
      const under = entries.filter(e => (base ? e.path.startsWith(base + '/') : true) && e !== conf)
        .map(e => ({ ...e, rel: base ? e.path.slice(base.length + 1) : e.path }));
      const confText = conf.data ? new TextDecoder().decode(conf.data) : await conf.file.text();
      let j = null; try { j = JSON.parse(confText); } catch {}
      if (!j || j.app !== 'rbt-tools') throw new Error('client.json could not be read — export it again from the Client Profiles app.');
      return { j, under };
    };
    if (confs.length === 1) {
      const { j, under } = await parse(confs[0]);
      const sum = await applyImport(j, under);
      prog.remove();
      importDoneModal(sum, after);
    } else {
      /* a clinic file: every client, one import */
      const sums = [];
      for (const conf of confs) {
        try { const { j, under } = await parse(conf); sums.push(await applyImport(j, under)); }
        catch (e2) { sums.push({ error: (e2 && e2.message) || 'unreadable', path: conf.path }); }
      }
      prog.remove();
      clinicDoneModal(sums, after);
    }
  } catch (err) {
    prog.remove();
    const scrim = el('div', 'modal-scrim'); const modal = el('div', 'modal'); modal.style.maxWidth = '460px';
    modal.innerHTML = `<div class="modal-head"><h2>Import didn't work</h2></div><div class="modal-body"><div class="hint">${esc(err && err.message ? err.message : 'That folder could not be read.')}</div></div><div class="modal-foot"><button class="btn btn-primary" id="ok3">OK</button></div>`;
    scrim.appendChild(modal); modalRoot().appendChild(scrim);
    $('#ok3', modal).onclick = () => scrim.remove();
  }
}
async function applyImport(j, under) {
  const code = normCode(j.code);
  if (!code) throw new Error('This folder is from an older version (no client code). Open it in the Client Profiles app and export again.');
  const slug = code.slug;
  const newer = (j.version || 6) > APP_VERSION;
  /* replace this client's previous contents only */
  Presets.removeClient(slug);
  await Gallery.removeClient(slug);
  Clients.remove(slug);
  const byRel = new Map(under.map(e => [e.rel.toLowerCase(), e]));
  let visualCount = 0;
  const addByPath = async (path, category) => {
    const e2 = byRel.get(String(path || '').toLowerCase());
    if (!e2) return null;
    const ext = extOf(e2.rel); if (!IMG_EXT[ext]) return null;
    const blob = e2.data ? new Blob([e2.data], { type: IMG_EXT[ext] }) : e2.file;
    const { blob: processed, fit } = await processImageFile(blob);
    const item = await Gallery.addCustom({ blob: processed, label: cleanLabel(baseName(e2.rel)), fit, category, client: slug });
    visualCount++;
    return item;
  };
  const V = async (v, category) => { // {img}|{text}|{bundled} → app visual
    if (!v) return null;
    if (v.bundled) {
      const it = Gallery.find(String(v.bundled));
      if (it) return { type: 'image', id: it.id, label: it.label };
      return v.label ? { type: 'text', text: String(v.label).slice(0, 24) } : null;
    }
    if (v.text) return { type: 'text', text: String(v.text).slice(0, 24) };
    if (v.img) {
      const it = await addByPath(v.img, category);
      return it ? { type: 'image', id: it.id, label: it.label } : (v.label ? { type: 'text', text: String(v.label).slice(0, 24) } : null);
    }
    return null;
  };
  const P = j.presets || {};
  const made = new Set();
  const nameOf = (p, i, arr) => (p.name && String(p.name).trim().slice(0, 20)) || (arr.length > 1 ? `Preset ${i + 1}` : code.name);
  for (const [i, p] of (P.timer || []).entries()) {
    Presets.add('timer', nameOf(p, i, P.timer), { m: p.m ?? 5, s: p.s ?? 0, style: ['pie','ring','digits'].includes(p.style) ? p.style : 'pie', showNum: p.showNum !== false, moreS: p.moreS || 60, visual: await V(p.visual, code.name) }, slug);
    made.add('timer');
  }
  for (const [i, p] of (P.wait || []).entries()) {
    Presets.add('wait', nameOf(p, i, P.wait), { m: p.m ?? 0, s: p.s ?? 30, style: ['pie','ring','digits'].includes(p.style) ? p.style : 'pie', showNum: p.showNum !== false, reward: await V(p.reward, code.name) }, slug);
    made.add('wait');
  }
  for (const [i, p] of (P.token || []).entries()) {
    Presets.add('token', nameOf(p, i, P.token), { count: clamp(+p.count || 5, 1, 10), theme: p.theme || '⭐', reward: await V(p.reward, code.name) }, slug);
    made.add('token');
  }
  for (const [i, p] of (P.ft || []).entries()) {
    const data = { first: await V(p.first, code.name), then: await V(p.then, code.name), third: await V(p.third, code.name), useThird: !!p.useThird && !!p.third };
    Presets.add('ft', nameOf(p, i, P.ft), data, slug);
    made.add('ft');
  }
  for (const [i, p] of (P.choice || []).entries()) {
    const options = [];
    for (const o of (p.options || []).slice(0, 16)) options.push(await V(o, code.name));
    while (options.length < 2) options.push(null);
    Presets.add('choice', nameOf(p, i, P.choice), { options }, slug);
    made.add('choice');
  }
  for (const [i, p] of (P.turn || []).entries()) {
    const people = [];
    for (const pe of (p.people || []).slice(0, 16)) {
      const nm = String(pe.name || '').slice(0, 16);
      let v = await V(pe.v, code.name);
      if (v && v.type === 'text' && v.text === nm) v = null; // a name is a name, not a picture
      people.push({ name: nm, v });
    }
    while (people.length < 2) people.push({ name: '', v: null });
    Presets.add('turn', nameOf(p, i, P.turn), { people, seconds: Math.max(0, +p.seconds || 0) }, slug);
    made.add('turn');
  }
  for (const [i, p] of (P.sched || []).entries()) {
    const items = [];
    for (const s2 of (p.steps || [])) { const v = await V(s2, 'activities'); if (v) items.push({ v }); }
    Presets.add('sched', nameOf(p, i, P.sched), { items, mode: p.mode === 'list' ? 'list' : 'focus' }, slug);
    made.add('sched');
  }
  for (const g of (j.gallery || [])) {
    if (g.bundled) continue; // already on this tablet
    await addByPath(g.path, ['places','activities','rewards','people'].includes(g.cat) ? g.cat : code.name);
  }
  const prescribed = (j.tools || []).map(t => { const k = String(t).toLowerCase().trim(); return TOOL_ALIAS[k] || k; }).filter(k => TITLE[k]);
  const rec = { slug, name: code.name, color: code.color, emoji: code.emoji, date: Date.now(), tools: [...made], prescribed: prescribed.length ? prescribed : null, visuals: visualCount };
  if (j.note) rec.note = String(j.note).slice(0, 4000);
  if (j.updated) rec.updated = String(j.updated).slice(0, 20);
  if (j.updatedBy) rec.updatedBy = String(j.updatedBy).slice(0, 30);
  if (j.limits && typeof j.limits === 'object') {
    const lim = {};
    Object.entries(j.limits).forEach(([k, L2]) => {
      const k2 = TOOL_ALIAS[String(k).toLowerCase()] || String(k).toLowerCase();
      if (TITLE[k2] && L2 && typeof L2 === 'object') {
        const o = {};
        if (L2.min != null && isFinite(+L2.min)) o.min = +L2.min;
        if (L2.max != null && isFinite(+L2.max)) o.max = +L2.max;
        if (L2.maxSec != null && isFinite(+L2.maxSec)) o.maxSec = +L2.maxSec;
        if (o.min != null && o.max != null && o.min > o.max) { const t2 = o.min; o.min = o.max; o.max = t2; }
        if (Object.keys(o).length) lim[k2] = o;
      }
    });
    if (Object.keys(lim).length) rec.limits = lim;
  }
  if (j.toolNotes && typeof j.toolNotes === 'object') {
    const tn = {};
    Object.entries(j.toolNotes).forEach(([k, t2]) => { const k2 = TOOL_ALIAS[String(k).toLowerCase()] || String(k).toLowerCase(); if (TITLE[k2] && t2) tn[k2] = String(t2).slice(0, 240); });
    if (Object.keys(tn).length) rec.toolNotes = tn;
  }
  if (j.visualsOnly) rec.visualsOnly = true;
  Clients.upsert(rec);
  syncProfileChip();
  const presetCount = Object.values(P).reduce((a, arr) => a + (arr ? arr.length : 0), 0);
  return { code, slug, presetCount, visualCount, newer, tools: [...made], note: !!rec.note };
}
function importDoneModal(sum, after) {
  const { code, slug, presetCount, visualCount, newer, tools, note } = sum;
  const scrim = el('div', 'modal-scrim'); const modal = el('div', 'modal'); modal.style.maxWidth = '500px';
  modal.innerHTML = `<div class="modal-head"><h2>Imported ${esc(code.emoji)} ${esc(code.name)} ✓</h2></div><div class="modal-body"><div class="about-text">
    ${newer ? '<p style="color:#9a5a2f"><b>Heads up:</b> this folder was made with a newer Client Profiles app. Everything readable was imported — but updating this app is recommended.</p>' : ''}
    <p><b>${presetCount}</b> preset${presetCount === 1 ? '' : 's'} across ${tools.map(k => TITLE[k]).join(', ') || 'no tools'}</p>
    <p><b>${visualCount}</b> picture${visualCount === 1 ? '' : 's'} added · ${note ? 'note included' : 'no note'}</p>
    <p>Switch to the <b>${esc(code.emoji)} ${esc(code.name)}</b> profile (top-left) to use it. Nothing else on this tablet was touched.</p>
  </div></div><div class="modal-foot"><button class="btn btn-ghost" id="okLater">Later</button><button class="btn btn-primary" id="okUse">Use ${esc(code.name)} now</button></div>`;
  scrim.appendChild(modal); modalRoot().appendChild(scrim);
  $('#okLater', modal).onclick = () => { scrim.remove(); after && after(); };
  $('#okUse', modal).onclick = () => { scrim.remove(); Profile.set(slug); after && after(); show('home'); };
}
function clinicDoneModal(sums, after) {
  const good = sums.filter(x => !x.error), bad = sums.filter(x => x.error);
  const scrim = el('div', 'modal-scrim'); const modal = el('div', 'modal'); modal.style.maxWidth = '540px';
  modal.innerHTML = `<div class="modal-head"><h2>Clinic file imported ✓</h2></div><div class="modal-body"><div class="about-text">
    <p><b>${good.length}</b> client${good.length === 1 ? '' : 's'} updated on this tablet:</p>
    ${good.map(x => `<p>· ${esc(x.code.emoji)} <b>${esc(x.code.name)}</b> — ${x.presetCount} preset${x.presetCount === 1 ? '' : 's'}, ${x.visualCount} picture${x.visualCount === 1 ? '' : 's'}</p>`).join('')}
    ${bad.length ? `<p style="color:#9a5a2f"><b>${bad.length}</b> folder${bad.length === 1 ? '' : 's'} could not be read.</p>` : ''}
    <p>Pick a profile from the top-left to start.</p>
  </div></div><div class="modal-foot"><button class="btn btn-primary" id="okC">Done</button></div>`;
  scrim.appendChild(modal); modalRoot().appendChild(scrim);
  $('#okC', modal).onclick = () => { scrim.remove(); after && after(); if (activeKey === 'home') show('home'); };
}

/* ============================================================
   IDLE REMINDER — a quiet nudge when the tablet sits untouched
   ============================================================ */
let lastInteract = now();
document.addEventListener('pointerdown', () => { lastInteract = now(); }, { capture: true, passive: true });
document.addEventListener('keydown', () => { lastInteract = now(); }, { capture: true });
setInterval(() => {
  const im = Store.get('idleMin');
  if (!im) return;
  if (now() - lastInteract >= im * 60000) {
    Sound.ping();
    lastInteract = now(); // one nudge per idle stretch, then the clock restarts
  }
}, 15000);

/* ============================================================
   INIT
   ============================================================ */
async function init() {
  Store.load(); Presets.load(); MyEmoji.load(); Recents.load(); Split.load(); Clients.load(); Profile.load(); TabBar.load(); Notes.load();
  try { Store.apply(); } catch {}
  try { FX.init(); } catch {}
  try { await DB.open(); } catch {}
  try { await Gallery.load(); } catch {}
  $('#homeBtn').onclick = () => show('home');
  $('#profileBtn').onclick = openProfileMenu;
  /* the tips ? lives between the tabs and Duo — new-RBT training wheels */
  const tb = el('button', 'tb-btn hidden'); tb.id = 'tipBtn'; tb.title = 'Tips for this screen';
  tb.innerHTML = '<svg viewBox="0 0 24 24" class="ic"><circle cx="12" cy="12" r="9"/><path d="M9.4 9.1a2.7 2.7 0 0 1 5.3.9c0 1.7-2.3 2.1-2.3 3.5"/><circle cx="12" cy="17" r=".45"/></svg><span>Tips</span>';
  $('#duoBtn').before(tb);
  tb.onclick = openTip;
  syncTipBtn();
  /* floating adjust: bottom-left, only while something is running & unlocked */
  const fa = el('button', 'adult-only hidden'); fa.id = 'floatAdjust'; fa.title = 'Adjust this tool';
  fa.innerHTML = '<svg viewBox="0 0 24 24" class="ic"><path d="M4 8h10M18 8h2M4 16h2M10 16h10"/><circle cx="16" cy="8" r="2.4"/><circle cx="8" cy="16" r="2.4"/></svg>';
  $('#app').appendChild(fa);
  syncProfileChip();
  wireFloatReset();
  Adjust.wireStage();
  $('#galleryBtn').onclick = openGallery;
  $('#settingsBtn').onclick = openSettings;
  $('#floatLock').onclick = () => Lock.engage();
  $('#fsBtn').onclick = () => { if (FS.isFS()) FS.exit(); else FS.enter(true); }; // manual fullscreen sticks until manually exited
  document.addEventListener('pointerdown', () => Alarm.stop(), { capture: true, passive: true });
  $('#duoBtn').onclick = () => {
    if (Split.on) { Split.on = false; syncDuoBtn(); show(Split.top); }
    else openDuoModal();
  };
  /* long-press must never open the browser's own menus — unlocking stays clean */
  document.addEventListener('contextmenu', (e) => e.preventDefault());
  document.addEventListener('dragstart', (e) => e.preventDefault());
  let lockHintAt = 0;
  document.addEventListener('pointerdown', (e) => {
    if (!Lock.on) return;
    if (e.target.closest('#unlockZone') || e.target.closest('.kid-safe')) return;
    const n = now(); if (n - lockHintAt < 4000) return; lockHintAt = n;
    flash('Hold the top-left corner to unlock');
  }, { capture: true, passive: true });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') { const s = $$('.modal-scrim:not(.no-esc)').pop(); if (s) s.remove(); } });
  try { new ResizeObserver(() => fitTopbar()).observe($('#topbar')); } catch {}
  window.__rbt = { FX, Timers, MS, Store, Presets, Clients, Gallery, Split, Profile, DuoLink, enterSplit, Adjust, runClientImport, applyImport, unzipAll, Notes, Sound };
  show('home');
  firstRunAck();
  /* a quiet heads-up after an update */
  try {
    const seen = LS.getItem('rbt.seenVer');
    if (seen && seen !== APP_VERSION_LABEL) setTimeout(() => flash(`Updated to ${APP_VERSION_LABEL} — “What's new” is in Settings`), 900);
    LS.setItem('rbt.seenVer', APP_VERSION_LABEL);
  } catch {}
}
